    <style>

        /* рҹ’Ў лҚ°мқҙн„° лӮҙліҙлӮҙкё°/к°Җм ёмҳӨкё° - нҸ° вҶ” л…ёнҠёл¶ҒмІҳлҹј кё°кё° к°„ лҚ°мқҙн„° мқҙлҸҷмҡ©, лҲҲм—җ лҚң лқ„кІҢ мһ‘кІҢ л°°м№ҳ */

        /* рҹ’Ў лӘЁлӢ¬ */

        .modal-field { margin-bottom: 14px; }

        .modal-field input { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 6px; font-size: 15px; outline: none; }
        .modal-field .date-inputs { display: flex; gap: 6px; align-items: center; }
        .modal-actions { display: flex; gap: 8px; margin-top: 18px; }

        .modal-btn.primary { background: linear-gradient(135deg, #6c5ce7, #0984e3); color: #fff; }

        /* рҹ’Ў м•ұ(н”Ңлһҳл„Ҳ) нҷ”л©ҙ */
        #app-screen { display: none; flex-direction: column; height: 100%; width: 100%; }

        #map { height: 35vh; width: 100%; flex-shrink: 0; z-index: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* лЎңл№„лЎң лҸҢм•„к°Җкё° лІ„нҠј */
        .back-to-lobby { background: #2d3436; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; cursor: pointer; width: 100%; justify-content: center; }

        .review-suggestion-btn { background: #eafaf1; color: #00b894; border: 1px dashed #00b894; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; cursor: pointer; width: 100%; justify-content: center; }

        /* м—¬н–ү м •ліҙ л°” (лҸ„мӢң/кё°к°„ мҡ”м•Ҫ) */
        .trip-info-bar { background: #ffffff; padding: 12px 14px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; gap: 8px; }

        /* лӘЁл“ң м „нҷҳ нғӯ */

        /* мҲҷмҶҢ / мӢқмӮ¬ / кІҪл№„ нҶ кёҖ лІ„нҠј */

        .extra-btn { flex: 1; padding: 10px 4px; border: 1px dashed #b2bec3; background: #fff; border-radius: 8px; font-size: 12px; font-weight: bold; color: #636e72; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }

        /* м ‘мқҙмӢқ м„№м…ҳ (мҲҷмҶҢ/мӢқмӮ¬/кІҪл№„) */
        .collapsible-section { background: #ffffff; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; display: none; }
        .collapsible-section.open { display: block; }
        .collapsible-title { padding: 12px; font-weight: bold; font-size: 13px; color: #2d3436; border-bottom: 1px solid #f1f2f6; display: flex; justify-content: space-between; align-items: center; }
        .collapsible-title .close-x { cursor: pointer; color: #b2bec3; font-size: 16px; }

        .hotel-row { display: flex; gap: 6px; align-items: center; }

        .expense-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
        .expense-desc { flex: 2; padding: 8px; border: 1px solid #dcdde1; border-radius: 6px; font-size: 13px; outline: none; }
        .expense-amount { flex: 1; padding: 8px; border: 1px solid #dcdde1; border-radius: 6px; font-size: 13px; outline: none; }
        .expense-add-btn { background: #00cec9; color: #fff; border: none; padding: 9px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; white-space: nowrap; }
        .expense-list { margin-top: 8px; }

        .expense-del { background: none; border: none; color: #d63031; font-size: 12px; cursor: pointer; font-weight: bold; padding: 4px; }
        .expense-day-total { display: flex; justify-content: space-between; font-weight: bold; padding-top: 10px; margin-top: 4px; color: #2d3436; font-size: 14px; }
        .expense-grand-total { margin-top: 8px; padding-top: 10px; border-top: 2px dashed #dcdde1; display: flex; justify-content: space-between; font-weight: 900; color: #0984e3; font-size: 14px; }

        /* м№ҙл“ңнҳ• лҰ¬мҠӨнҠё & л“ңлһҳк·ё мҶҗмһЎмқҙ */
        #planner-list-container { min-height: 50px; }
        .place-item { background: #ffffff; border-radius: 10px; padding: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.06); border-left: 5px solid #6c5ce7; position: relative; }
        .place-item.sortable-ghost { opacity: 0.4; border: 2px dashed #0984e3; }
        .place-item.meal-item { border-left-color: #fdcb6e; }

        .fixed-item { background: #eef9f8; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; border-left: 5px solid #00cec9; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #2d3436; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .fixed-item.flight-item { background: #f3f0ff; border-left-color: #6c5ce7; }
        .fixed-item.flight-item .fi-label { color: #6c5ce7; }
        .flight-preview { font-size: 12px; color: #00b894; margin-top: 6px; min-height: 14px; }
        .flight-lookup-btn { background: #eef6ff; color: #0984e3; border: none; padding: 10px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; }

        /* рҹ’Ў н•ӯкіөнҺё мҲҳлҸҷ мһ…л Ҙ (лҜёлһҳ л№„н–үнҺё л“ұ API мЎ°нҡҢк°Җ м•Ҳ лҗҳлҠ” кІҪмҡ°лҘј мң„н•ң лҢҖмІҙ мһ…л Ҙ л°©мӢқ) */
        .flight-manual-toggle { font-size: 12px; color: #0984e3; text-decoration: underline; cursor: pointer; margin-top: 8px; display: inline-block; }
        .flight-manual-fields { display: none; margin-top: 10px; padding: 12px 12px 4px; background: #f8f9fc; border: 1px dashed #b2bec3; border-radius: 8px; }
        .flight-manual-fields.open { display: block; }
        .flight-manual-fields .modal-field { margin-bottom: 10px; }
        .flight-manual-fields .modal-field label { font-size: 11px; }
        .manual-flight-save-btn { width: 100%; padding: 9px; font-size: 13px; margin-top: 2px; margin-bottom: 8px; }
        .fixed-item .fi-label { font-weight: 900; color: #00b5b0; margin-right: 6px; }
        .fixed-item .fi-addr { color: #7f8fa6; font-size: 11px; display: block; margin-top: 2px; }

        .drag-handle { display: flex; align-items: center; justify-content: center; font-size: 20px; color: #b2bec3; padding: 0 10px 0 0; cursor: grab; }
        .drag-handle:active { cursor: grabbing; color: #6c5ce7; }

        /* мҲңм„ң ліҖкІҪ лІ„нҠј (л“ңлһҳк·ёк°Җ м–ҙл Өмҡҙ кІҪмҡ°лҘј мң„н•ң лҢҖмІҙ мҲҳлӢЁ) */
        .order-btns { display: flex; flex-direction: column; gap: 3px; margin-right: 10px; }
        .order-btn { width: 24px; height: 18px; line-height: 1; border: 1px solid #dcdde1; background: #f8faff; color: #636e72; border-radius: 4px; font-size: 10px; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; }
        .order-btn:disabled { opacity: 0.25; cursor: default; }
        .order-btn:active:not(:disabled) { background: #dfe6f0; }

        .place-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; width: 100%; }
        .header-left { display: flex; align-items: center; gap: 2px; }

        .time-wrapper { display: flex; align-items: center; gap: 4px; }
        .time-select { padding: 6px 4px; border: 1px solid #e1e5ee; border-radius: 6px; font-weight: bold; color: #0984e3; font-size: 15px; background: #f8faff; outline: none; text-align: center; }
        .time-text { font-weight: 800; color: #0984e3; font-size: 16px; }

        .delete-btn { background: #ffeaa7; color: #d63031; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; }

        .meal-tag { display: inline-block; background: #ffeaa7; color: #d35400; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; margin-right: 6px; vertical-align: middle; }

        .place-address { font-size: 12px; color: #7f8fa6; display: block; margin-bottom: 10px; }

        .memo-input { width: 100%; border: 1px solid #e1e5ee; border-radius: 6px; padding: 10px; font-size: 14px; background: #fcfdfe; resize: none; outline: none; margin-bottom: 5px; }
        .memo-input:focus { border-color: #6c5ce7; background: #fff; }

        /* л”Ҙл§ҒнҒ¬ лІ„нҠј */
        .route-link-wrapper { display: flex; justify-content: center; margin: -10px 0 20px 0; }
        .route-link-btn { background: #e3f2fd; color: #0984e3; border: 1px dashed #0984e3; padding: 12px 24px; border-radius: 25px; font-size: 13px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 8px rgba(9, 132, 227, 0.15); }

        .pdf-btn { background: #2d3436; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 15px; font-weight: bold; margin-top: 15px; margin-bottom: 40px; cursor: pointer; }

        .pac-container { z-index: 10000 !important; }

        /* рҹ’» PC(лҚ°мҠӨнҒ¬нҶұ) л Ҳмқҙм•„мӣғ */
        @media (min-width: 768px) {
            body { background: #dfe6f0; }
            #lobby-screen { max-width: 480px; left: 50%; transform: translateX(-50%); top: 20px; height: calc(100% - 40px); border-radius: 18px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
            #app-screen { flex-direction: row; max-width: 1400px; margin: 0 auto; width: 100%; height: 100%; box-shadow: 0 0 40px rgba(0,0,0,0.08); }
            #map { width: 46%; height: 100%; }
            #sidebar { width: 54%; height: 100%; }
        }
        /* рҹ’Ў мӢңмһ‘ мҠӨн”ҢлһҳмӢң нҷ”л©ҙ (лЎңкі  + м•ұ мқҙлҰ„, нҺҳмқҙл“ңмқё вҶ’ нҷҖл“ң вҶ’ нҺҳмқҙл“ңм•„мӣғ) */
        #splash-screen {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
            background: #ffffff;
        }
        #splash-screen .splash-logo {
            width: 116px; height: 116px; border-radius: 26px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            object-fit: cover;
            opacity: 0; animation: splashFade 1.8s ease forwards;
        }
        #splash-screen .splash-title {
            font-size: 22px; font-weight: 900; color: #0984e3; letter-spacing: 0.5px;
            opacity: 0; animation: splashFade 1.8s ease forwards;
        }
        @keyframes splashFade {
            0%   { opacity: 0; transform: translateY(6px) scale(0.96); }
            22%  { opacity: 1; transform: translateY(0) scale(1); }
            75%  { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-6px) scale(0.98); }
        }
        #splash-screen.hidden { display: none; }
        #splash-screen .splash-credit {
            position: absolute; bottom: 28px; left: 0; right: 0; text-align: center;
            font-size: 12px; color: #000000;
            opacity: 0; animation: splashFade 1.8s ease forwards;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<body>

    <div id="splash-screen">
        <img class="splash-logo" src="icon-192.png" alt="Triptic лЎңкі ">
        <div class="splash-title">Triptic</div>
        <div class="splash-credit">Developed by Ben Lee</div>
    </div>
    <script>
        // мҠӨн”ҢлһҳмӢң м• лӢҲл©”мқҙм…ҳ(1.8мҙҲ) мў…лЈҢ нӣ„ нҷ”л©ҙм—җм„ң мҷ„м „нһҲ м ңкұ°н•ҙм„ң мқҙнӣ„ нғӯ мқҙлІӨнҠёлҘј к°ҖлҰ¬м§Җ м•ҠлҸ„лЎқ н•Ё
        window.addEventListener('load', function () {
            setTimeout(function () {
                var splash = document.getElementById('splash-screen');
                if (splash) splash.classList.add('hidden');
            }, 1800);
        });
    </script>

        let pendingCity = null;

        const AVIATIONSTACK_API_KEY = "7d97ae962ebc771c6393ae2e14cf1aeb";

        let activeShareId = null;   // нҢҢнӢ°мһҘ(нҺём§‘мһҗ) мӘҪ: нҳ„мһ¬ н”„лЎңм қнҠёмқҳ мөңмӢ  кіөмң  л§ҒнҒ¬ ID

        /* ============ кё°кё°(нҷҲ нҷ”л©ҙ м•„мқҙмҪҳ) л°ұм—… мӢңмҠӨн…ң ============
           рҹ’Ў iOSм—җм„ң "нҷҲ нҷ”л©ҙм—җ м¶”к°Җ"лЎң л§Ңл“  м•ұмқҖ м•„мқҙмҪҳмқ„ м§Җмӣ лӢӨк°Җ лӢӨмӢң л§Ңл“Өл©ҙ к·ё м•Ҳмқҳ м ҖмһҘ кіөк°„(localStorage)мқҙ

              к·ёлһҳм„ң м•ұмқ„ м—ҙ л•Ңл§ҲлӢӨ мқҙ м—ҙмҮ лЎң Firebaseм—җ мөңмӢ  лҚ°мқҙн„°лҘј мһҗлҸҷмңјлЎң мҳ¬л Өл‘җкі (л°ұм—…),
              лЎңм»¬ м ҖмһҘ кіөк°„мқҙ л№„м–ҙмһҲлҠ”лҚ° мқҙ м—ҙмҮ лЎң лҗң л°ұм—…мқҙ м„ңлІ„м—җ мһҲмңјл©ҙ мһҗлҸҷмңјлЎң ліөкө¬н•ҙмҳЁлӢӨ. */
        let backupId = null;
        let backupSyncTimer = null;

        function ensureBackupId() {
            const params = new URLSearchParams(location.search);
            let id = params.get('backup');
            if (!id) {
                // лЎңм»¬м—җ мҳҲм „м—җ л§Ңл“Өм–ҙл‘” м—ҙмҮ к°Җ мһҲмңјл©ҙ мһ¬мӮ¬мҡ©(к°ҷмқҖ лёҢлқјмҡ°м Җм—җм„ң мөңмҙҲ 1нҡҢ мһҗм—°мҠӨлҹҪкІҢ мҳ®кІЁк°җ), м—Ҷмңјл©ҙ мғҲлЎң л°ңкёү

                //    лҲ„лҘҙл©ҙ мқҙ м—ҙмҮ к°Җ нҸ¬н•Ёлҗң URLмқҙ м•„мқҙмҪҳм—җ м ҖмһҘлҗңлӢӨ.
                history.replaceState(null, '', `${location.pathname}?${params.toString()}`);
            }
            localStorage.setItem('smartPlannerBackupId', id);
            backupId = id;
        }

        // лЎңм»¬ м ҖмһҘ кіөк°„(allProjects)мқҙ л№„м–ҙмһҲкұ°лӮҳ л¶ҖмӢӨн•  л•Ң, м„ңлІ„м—җ мқҙ м—ҙмҮ лЎң л°ұм—…лҗң лҚ°мқҙн„°к°Җ мһҲмңјл©ҙ л¶Ҳлҹ¬мҷҖ н•©м№ңлӢӨ.
        async function restoreFromCloudBackupIfNeeded() {
            if (!backupId) return;
            try {
                const res = await fetch(`${FIREBASE_DB_URL}/devicebackups/${backupId}.json`);
                if (!res.ok) return; // рҹ’Ў м„ңлІ„к°Җ мҳӨлҘҳ мғҒнғңмҪ”л“ңлҘј мЈјл©ҙ(к¶Ңн•ң л¬ём ң л“ұ) м•„л¬ҙ кІғлҸ„ н•ҳм§Җ м•ҠлҠ”лӢӨ
                const cloudProjects = await res.json();
                if (!cloudProjects || typeof cloudProjects !== 'object' || Array.isArray(cloudProjects)) return;
                // рҹ’Ў FirebaseлҠ” мӢӨнҢЁ мӢңм—җлҸ„ 200мңјлЎң {"error":"..."} к°ҷмқҖ ліёл¬ёмқ„ мӨ„ мҲҳ мһҲлӢӨ.
                //    мөңмғҒмң„м—җ error н•„л“ңк°Җ мһҲмңјл©ҙ м •мғҒм Ғмқё н”„лЎңм қнҠё лӘ©лЎқмқҙ м•„лӢҲлҜҖлЎң л¬ҙмӢңн•ңлӢӨ.
                if (typeof cloudProjects.error === 'string') return;
                // рҹ’Ў к°’мқҙ мӢӨм ң н”„лЎңм қнҠё к°қмІҙ(data н•„л“ңлҘј к°Җм§„ object) нҳ•нғңк°Җ м•„лӢҢ н•ӯлӘ©мқҖ кұёлҹ¬лӮёлӢӨ
                const cleanCloudProjects = {};
                Object.keys(cloudProjects).forEach(name => {
                    const p = cloudProjects[name];
                    if (p && typeof p === 'object' && !Array.isArray(p)) cleanCloudProjects[name] = p;
                });
                if (Object.keys(cleanCloudProjects).length === 0) return;

                const localNames = Object.keys(allProjects);
                if (localNames.length === 0) {
                    // лЎңм»¬мқҙ мҷ„м „нһҲ л№„м–ҙмһҲмңјл©ҙ(=м•„мқҙмҪҳмқ„ м§Җмӣ лӢӨ мғҲлЎң л§Ңл“  м§Ғнӣ„) м„ңлІ„ л°ұм—…мқ„ нҶөм§ёлЎң ліөмӣҗ
                    allProjects = cleanCloudProjects;
                    saveAllProjects();
                    renderLobby();
                } else {
                    // лЎңм»¬м—җ мқҙлҜё лҚ°мқҙн„°к°Җ мһҲмңјл©ҙ, лЎңм»¬м—җ м—ҶлҠ” н”„лЎңм қнҠёл§Ң м¶”к°ҖлЎң мұ„мӣҢмӨҖлӢӨ(лЎңм»¬ мөңмӢ  мһ‘м—…мқ„ лҚ®м–ҙм“°м§Җ м•Ҡкё° мң„н•Ё)
                    let addedAny = false;
                    Object.keys(cleanCloudProjects).forEach(name => {
                        if (!allProjects[name]) { allProjects[name] = cleanCloudProjects[name]; addedAny = true; }
                    });
                    if (addedAny) { saveAllProjects(); renderLobby(); }
                }
            } catch (e) { /* л„ӨнҠёмӣҢнҒ¬ л¬ём ң л“ұмқҖ мЎ°мҡ©нһҲ л¬ҙмӢң - лӢӨмқҢм—җ м ҖмһҘн•  л•Ң лӢӨмӢң мӢңлҸ„лҗЁ */ }
        }

        // лҚ°мқҙн„°к°Җ л°”лҖ” л•Ңл§ҲлӢӨ(л””л°”мҡҙмҠӨ м Ғмҡ©) нҒҙлқјмҡ°л“ңм—җ мЎ°мҡ©нһҲ л°ұм—…
        function scheduleBackupSync() {
            if (!backupId) return;
            clearTimeout(backupSyncTimer);
            backupSyncTimer = setTimeout(pushBackupSync, 1500);
        }

        async function pushBackupSync() {
            if (!backupId) return;
            try {
                await fetch(`${FIREBASE_DB_URL}/devicebackups/${backupId}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(allProjects)
                });
            } catch (e) { /* мӢӨнҢЁн•ҙлҸ„ лӢӨмқҢ м ҖмһҘ л•Ң лӢӨмӢң мӢңлҸ„лҗҳлҜҖлЎң мЎ°мҡ©нһҲ л¬ҙмӢң */ }
        }

        function generateShortId(len = 7) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let id = '';
            for (let i = 0; i < len; i++) id += chars[Math.floor(Math.random() * chars.length)];
            return id;
        }

        async function initSystem() {
            // рҹ’Ў ?id=... (мӢ к·ң л°©мӢқ: Firebaseм—җ м ҖмһҘлҗң лҚ°мқҙн„°лҘј м§§мқҖ IDлЎң л¶Ҳлҹ¬мҳҙ)
            // рҹ’Ў ?share=... (кө¬лІ„м „ л°©мӢқ: мқҙм „м—җ л§Ңл“  кёҙ л§ҒнҒ¬мҷҖмқҳ нҳёнҷҳмқ„ мң„н•ҙ мң м§Җ)
            const params = new URLSearchParams(location.search);
            const shareId = params.get('id');
            const shareParam = params.get('share');

            if (shareId) {
                try {
                    const res = await fetch(`${FIREBASE_DB_URL}/shares/${shareId}.json`);
                    const payload = await res.json();
                    if (!payload) throw new Error('not found');
                    currentSharedId = shareId;
                    openSharedView(payload);
                    return;
                } catch (e) {
                    alert('кіөмң  л§ҒнҒ¬лҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ. л§ҒнҒ¬к°Җ л§ҢлЈҢлҗҳм—Ҳкұ°лӮҳ мҶҗмғҒлҗҳм—Ҳмқ„ мҲҳ мһҲм–ҙмҡ”.');
                }
            } else if (shareParam) {
                try {
                    const json = LZString.decompressFromEncodedURIComponent(shareParam);
                    const payload = JSON.parse(json);
                    openSharedView(payload);
                    return;
                } catch (e) {
                    alert('кіөмң  л§ҒнҒ¬лҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ. л§ҒнҒ¬к°Җ мҶҗмғҒлҗҳм—Ҳмқ„ мҲҳ мһҲм–ҙмҡ”.');
                }
            }
            ensureBackupId();               // рҹ’Ў мқҙ кё°кё°мқҳ ліөкө¬ м—ҙмҮ лҘј URLм—җ мӢ¬м–ҙл‘”лӢӨ (нҷҲ нҷ”л©ҙ м•„мқҙмҪҳмқҙ мқҙ URLмқ„ кё°м–өн•Ё)
            renderLobby();
            restoreFromCloudBackupIfNeeded(); // рҹ’Ў лЎңм»¬мқҙ л№„м–ҙмһҲмңјл©ҙ м„ңлІ„ л°ұм—…м—җм„ң мһҗлҸҷ ліөкө¬
        }

            document.getElementById('lobby-screen').style.display = 'flex';

            const container = document.getElementById('project-list-container');

            if (projectNames.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#b2bec3; font-size:14px; margin-top:20px;">м ҖмһҘлҗң м—¬н–үмқҙ м—ҶмҠөлӢҲлӢӨ.<br>мғҲ м—¬н–үмқ„ л§Ңл“Өм–ҙліҙм„ёмҡ”!</p>';

        async function submitCreateProject() {
            const name = document.getElementById('new-name-input').value.trim();
            const startVal = document.getElementById('new-start-input').value;
            const endVal = document.getElementById('new-end-input').value;
            const obCode = document.getElementById('new-outbound-flight-input').value.trim();
            const rtCode = document.getElementById('new-return-flight-input').value.trim();

            if (!name) { alert('м—¬н–ү мқҙлҰ„мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }
            if (allProjects[name]) { alert('мқҙлҜё к°ҷмқҖ мқҙлҰ„мқҳ н”„лЎңм қнҠёк°Җ мһҲмҠөлӢҲлӢӨ.'); return; }
            if (!pendingCity) { alert('лӘ©лЎқм—җм„ң лҸ„мӢңлҘј м„ нғқн•ҙмЈјм„ёмҡ”.'); return; }
            if (!startVal || !endVal) { alert('м—¬н–ү кё°к°„мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }
            if (new Date(startVal) > new Date(endVal)) { alert('мў…лЈҢмқјмқҙ м¶ңл°ңмқјліҙлӢӨ л№ лҘј мҲҳ м—ҶмҠөлӢҲлӢӨ.'); return; }

            //    нҺёлӘ… мһ…л Ҙмқ„ м§Җмӣ лӢӨл©ҙ(нҳ№мқҖ м• мҙҲм—җ л№„м–ҙмһҲлӢӨл©ҙ) н•ӯкіөнҺё м—Ҷмқҙ м ҖмһҘлҗңлӢӨ (мҷ„м „нһҲ м„ нғқ мӮ¬н•ӯ).
            if (obCode && !pendingFlights.outbound) pendingFlights.outbound = await lookupFlight(obCode, startVal);
            if (rtCode && !pendingFlights.return) pendingFlights.return = await lookupFlight(rtCode, endVal);
            if (!obCode) pendingFlights.outbound = null;
            if (!rtCode) pendingFlights.return = null;

            allProjects[name] = {
                city: pendingCity.name,
                cityLat: pendingCity.lat,
                cityLng: pendingCity.lng,
                data: { 1: [] },
                hotels: {},
                meals: {},
                expenses: {},
                flights: { outbound: pendingFlights.outbound, return: pendingFlights.return },
                currentDay: 1,
                startDate: startVal,
                endDate: endVal,
                lastModified: new Date().toLocaleDateString()
            };

            saveAllProjects();
            closeModal();
            openProject(name);
        }

        async function submitEditTrip() {
            const startVal = document.getElementById('edit-start-input').value;
            const endVal = document.getElementById('edit-end-input').value;
            const obCode = document.getElementById('edit-outbound-flight-input').value.trim();
            const rtCode = document.getElementById('edit-return-flight-input').value.trim();

            if (!pendingCity) { alert('лӘ©лЎқм—җм„ң лҸ„мӢңлҘј м„ нғқн•ҙмЈјм„ёмҡ”.'); return; }
            if (!startVal || !endVal) { alert('м—¬н–ү кё°к°„мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }
            if (new Date(startVal) > new Date(endVal)) { alert('мў…лЈҢмқјмқҙ м¶ңл°ңмқјліҙлӢӨ л№ лҘј мҲҳ м—ҶмҠөлӢҲлӢӨ.'); return; }

            // рҹ’Ў нҺёлӘ…мқ„ мғҲлЎң мһ…л Ҙ/ліҖкІҪн–ҲлҠ”лҚ° мЎ°нҡҢлҘј м•Ҳ лҲҢл ҖлӢӨл©ҙ м ҖмһҘ м „м—җ н•ң лІҲ лҚ” мӢңлҸ„
            if (obCode && (!pendingFlights.outbound || pendingFlights.outbound.flightNo !== obCode.toUpperCase())) {
                pendingFlights.outbound = await lookupFlight(obCode, startVal);
            }
            if (rtCode && (!pendingFlights.return || pendingFlights.return.flightNo !== rtCode.toUpperCase())) {
                pendingFlights.return = await lookupFlight(rtCode, endVal);
            }
            if (!obCode) pendingFlights.outbound = null;
            if (!rtCode) pendingFlights.return = null;

            tripCity = pendingCity.name;
            tripCityLat = pendingCity.lat;
            tripCityLng = pendingCity.lng;
            tripStart = startVal;
            tripEnd = endVal;
            flightsData = { outbound: pendingFlights.outbound, return: pendingFlights.return };

            closeModal();
            if (map) { map.setCenter({ lat: tripCityLat, lng: tripCityLng }); map.setZoom(13); }
            generateSchedule(true);
            renderTripInfoBar();
            saveData();
        }

        }

        function showLobby() {
            saveData();
            activeProjectName = null;
            renderLobby();
        }

        /* ============ ліҙкё° м „мҡ© кіөмң  л§ҒнҒ¬ ============ */

        // рҹ’Ў нҢҢнӢ°мһҘ(нҺём§‘мһҗ)мқҙ л§ҒнҒ¬лҘј л§Ңл“Өл©ҙ, нҳ„мһ¬ м—¬н–ү лҚ°мқҙн„° м „мІҙлҘј м••м¶•н•ҙм„ң URLм—җ лӢҙлҠ”лӢӨ.
        //    м„ңлІ„к°Җ м—ҶмңјлҜҖлЎң "к·ё мҲңк°„мқҳ мҠӨлғ…мғ·"мқҙл©°, мқҙнӣ„ мқјм •мқ„ л°”кҫёл©ҙ л§ҒнҒ¬лҘј мғҲлЎң л§Ңл“Өм–ҙ лӢӨмӢң ліҙлӮҙм•ј н•ңлӢӨ.
        async function openShareModal() {
            if (!FIREBASE_DB_URL || FIREBASE_DB_URL.indexOf('YOUR_') === 0) {
                alert('кіөмң  кё°лҠҘмқ„ мӮ¬мҡ©н•ҳл Өл©ҙ лЁјм Җ Firebase м„Өм •мқҙ н•„мҡ”н•ҙмҡ”. мҪ”л“ң мғҒлӢЁмқҳ FIREBASE_DB_URL к°’мқ„ ліёмқёмқҳ Firebase н”„лЎңм қнҠё мЈјмҶҢлЎң л°”кҝ”мЈјм„ёмҡ”.');
                return;
            }

            const root = document.getElementById('modal-root');
            root.innerHTML = `
                <div class="modal-overlay" id="share-modal-overlay">
                    <div class="modal-box">
                        <h3>рҹ”— ліҙкё° м „мҡ© кіөмң  л§ҒнҒ¬</h3>
                        <p style="font-size:13px; color:#7f8fa6;">л§ҒнҒ¬лҘј л§Ңл“ңлҠ” мӨ‘мһ…лӢҲлӢӨ...</p>
                    </div>
                </div>
            `;

            const payload = {
                city: tripCity, cityLat: tripCityLat, cityLng: tripCityLng,
                startDate: tripStart, endDate: tripEnd,
                data: plannerData, hotels: hotelsData, meals: mealsData, expenses: expensesData, flights: flightsData
            };

            try {
                const shareId = activeShareId || generateShortId(); // рҹ’Ў мқҙлҜё л§Ңл“  л§ҒнҒ¬к°Җ мһҲмңјл©ҙ мһ¬мӮ¬мҡ© (к°ҷмқҖ л§ҒнҒ¬к°Җ кі„мҶҚ мӢӨмӢңк°„мңјлЎң мӮҙм•„мһҲмқҢ)
                const res = await fetch(`${FIREBASE_DB_URL}/shares/${shareId}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('save failed');

                activeShareId = shareId;
                saveData(); // мқҙ н”„лЎңм қнҠёмқҳ кіөмң  IDлҘј кё°м–өн•ҙл‘¬м„ң, мқҙнӣ„ нҺём§‘н•  л•Ңл§ҲлӢӨ мһҗлҸҷмңјлЎң к°ҷмқҖ л§ҒнҒ¬м—җ мөңмӢ  лӮҙмҡ©мқҙ л°ҳмҳҒлҗҳкІҢ н•Ё

                const baseUrl = location.origin + location.pathname;
                const shareUrl = `${baseUrl}?id=${shareId}`;

                root.innerHTML = `
                    <div class="modal-overlay" id="share-modal-overlay">
                        <div class="modal-box">
                            <h3>рҹ”— ліҙкё° м „мҡ© кіөмң  л§ҒнҒ¬</h3>
                            <p style="font-size:12px; color:#7f8fa6; margin-top:-10px; margin-bottom:14px; line-height:1.6;">
                                мқҙ л§ҒнҒ¬лҘј л°ӣмқҖ мӮ¬лһҢмқҖ нҺём§‘ лӘЁл“ң/л·° лӘЁл“ң кө¬л¶„ м—Ҷмқҙ <b>нҳ„мһ¬ мқјм •л§Ң к·ёлҢҖлЎң</b> ліј мҲҳ мһҲм–ҙмҡ”.<br>
                                вң… мқҙ л§ҒнҒ¬лҠ” <b>мӢӨмӢңк°„мңјлЎң м—°лҸҷ</b>лҸјмҡ”. мқҙнӣ„ мқјм •мқ„ мҲҳм •н•ҳл©ҙ лӘҮ мҙҲ м•Ҳм—җ мһҗлҸҷмңјлЎң мөңмӢ  лӮҙмҡ©мқҙ л°ҳмҳҒлҗҳлӢҲ, л§ҒнҒ¬лҘј мғҲлЎң л§Ңл“Ө н•„мҡ” м—Ҷмқҙ <b>н•ң лІҲ ліҙлӮё л§ҒнҒ¬лҘј кі„мҶҚ мҚЁлҸ„ лҗ©лӢҲлӢӨ.</b>
                            </p>
                            <div class="modal-field">
                                <textarea id="share-link-textarea" readonly style="width:100%; height:60px; padding:10px; border:1px solid #dcdde1; border-radius:6px; font-size:13px; resize:none; outline:none;">${shareUrl}</textarea>
                            </div>
                            <div class="modal-actions">
                                <button type="button" class="modal-btn secondary" onclick="closeModal()">лӢ«кё°</button>
                                <button type="button" class="modal-btn primary" onclick="copyShareLink()">ліөмӮ¬н•ҳкё°</button>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                root.innerHTML = '';
                alert('л§ҒнҒ¬ мғқм„ұ мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ. л„ӨнҠёмӣҢнҒ¬ мғҒнғңлҘј нҷ•мқён•ҳкұ°лӮҳ мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.');
            }
        }

        function copyShareLink() {
            const textarea = document.getElementById('share-link-textarea');
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            const done = () => alert('л§ҒнҒ¬к°Җ ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ!');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textarea.value).then(done).catch(() => { document.execCommand('copy'); done(); });
            } else {
                document.execCommand('copy');
                done();
            }
        }

        // рҹ’Ў кіөмң  л§ҒнҒ¬лЎң л“Өм–ҙмҳЁ мӮ¬лһҢмқҙ ліҙлҠ” нҷ”л©ҙ: лЎңл№„ м—Ҷмқҙ л°”лЎң м§„мһ…, нҺём§‘/л·° лӘЁл“ң м „нҷҳ м—Ҷмқҙ н•ӯмғҒ мқҪкё° м „мҡ©
        function openSharedView(payload) {
            activeProjectName = null; // saveData()к°Җ мһҗлҸҷмңјлЎң м•„л¬ҙ лҸҷмһ‘лҸ„ н•ҳм§Җ м•ҠкІҢ лҗЁ (localStorageм—җ м ҖмһҘ м•Ҳ н•Ё)

            plannerData = payload.data || {};
            hotelsData = payload.hotels || {};
            mealsData = payload.meals || {};
            expensesData = payload.expenses || {};
            flightsData = payload.flights || { outbound: null, return: null };
            currentDay = 1;

            tripCity = payload.city || '';
            tripCityLat = (payload.cityLat != null) ? payload.cityLat : null;
            tripCityLng = (payload.cityLng != null) ? payload.cityLng : null;
            tripStart = payload.startDate || '';
            tripEnd = payload.endDate || '';

            document.getElementById('lobby-screen').style.display = 'none';
            const appScreen = document.getElementById('app-screen');
            appScreen.style.display = 'flex';
            appScreen.classList.add('shared-view');

            const centerPoint = (tripCityLat && tripCityLng) ? { lat: tripCityLat, lng: tripCityLng } : { lat: 37.5665, lng: 126.9780 };
            map = new google.maps.Map(document.getElementById('map'), { zoom: 13, center: centerPoint, disableDefaultUI: true, zoomControl: true });

            currentMode = 'view';
            const sidebar = document.getElementById('sidebar');
            sidebar.className = 'view-mode';

            if (!document.getElementById('shared-banner')) {
                const banner = document.createElement('div');
                banner.id = 'shared-banner';
                banner.className = 'shared-banner';
                banner.innerText = 'рҹ”— кіөмң л°ӣмқҖ м—¬н–ү мқјм • (мқҪкё° м „мҡ©)';
                sidebar.prepend(banner);

                const suggestBtn = document.createElement('button');
                suggestBtn.type = 'button';
                suggestBtn.id = 'suggest-place-btn';
                suggestBtn.className = 'suggest-place-btn';
                suggestBtn.innerText = 'рҹ’Ў мһҘмҶҢ м¶”к°Җ кұҙмқҳн•ҳкё°';
                suggestBtn.onclick = openSuggestModal;
                banner.insertAdjacentElement('afterend', suggestBtn);
            }

            generateSchedule(true); // лӮҙл¶Җм—җм„ң changeDay()к№Ңм§Җ нҳём¶ңлҗҳм–ҙ лҰ¬мҠӨнҠё/м§ҖлҸ„/кІҪлЎңк°Җ к·ёлҢҖлЎң л ҢлҚ”л§ҒлҗЁ

            lastSharedPayloadStr = JSON.stringify(payload);
            startSharedPolling();
        }

        /* ============ кіөмң  нҷ”л©ҙ мӢӨмӢңк°„ к°ұмӢ  (нҸҙл§Ғ) ============ */
        //  рҹ’Ў нҢҢнӢ°мһҘмқҙ мқјм •мқ„ мҲҳм •н•ҳл©ҙ лӘҮ мҙҲ м•Ҳм—җ Firebaseм—җ л°ҳмҳҒлҗҳлҜҖлЎң,
        //     кіөмң л°ӣмқҖ нҷ”л©ҙм—җм„ңлҸ„ мЈјкё°м ҒмңјлЎң нҷ•мқён•ҙм„ң ліҖкІҪмқҙ мһҲмңјл©ҙ мһҗлҸҷмңјлЎң лӢӨмӢң к·ёлҰ°лӢӨ.

        let sharedPollTimer = null;
        let lastSharedPayloadStr = null;

        function startSharedPolling() {
            if (sharedPollTimer) clearInterval(sharedPollTimer);
            sharedPollTimer = setInterval(async () => {
                if (!currentSharedId) return;
                try {
                    const res = await fetch(`${FIREBASE_DB_URL}/shares/${currentSharedId}.json`);
                    const payload = await res.json();
                    if (!payload) return;
                    const str = JSON.stringify(payload);
                    if (str === lastSharedPayloadStr) return; // ліҖкІҪ м—Ҷмңјл©ҙ лӢӨмӢң к·ёлҰ¬м§Җ м•ҠмқҢ
                    lastSharedPayloadStr = str;
                    applySharedUpdate(payload);
                } catch (e) { /* л„ӨнҠёмӣҢнҒ¬ мҳӨлҘҳлҠ” мЎ°мҡ©нһҲ л¬ҙмӢңн•ҳкі  лӢӨмқҢ нҸҙл§Ғм—җм„ң мһ¬мӢңлҸ„ */ }
            }, 5000);
        }

        function applySharedUpdate(payload) {
            plannerData = payload.data || {};
            hotelsData = payload.hotels || {};
            mealsData = payload.meals || {};
            expensesData = payload.expenses || {};

            tripCity = payload.city || '';
            tripCityLat = (payload.cityLat != null) ? payload.cityLat : null;
            tripCityLng = (payload.cityLng != null) ? payload.cityLng : null;
            tripStart = payload.startDate || '';
            tripEnd = payload.endDate || '';

            renderTripInfoBar();
            generateSchedule(true); // нҳ„мһ¬ ліҙкі  мһҲлҚҳ лӮ м§ң(currentDay)лҠ” к·ёлҢҖлЎң мң м§Җлҗң мұ„ лӢӨмӢң к·ёл Өм§җ
        }

        /* ============ мһҘмҶҢ м¶”к°Җ кұҙмқҳн•ҳкё° (кІҢмҠӨнҠё вҶ’ нҢҢнӢ°мһҘ, Firebase мӢӨмӢңк°„ лҸҷкё°нҷ”) ============ */
        //  рҹ’Ў кІҢмҠӨнҠёк°Җ м ңм•Ҳн•ҳл©ҙ Firebaseмқҳ /suggestions/{кіөмң ID}/ м•„лһҳм—җ л°”лЎң м ҖмһҘлҗҳкі ,
        //     нҢҢнӢ°мһҘмқҖ 'л°ӣмқҖ м ңм•Ҳ нҷ•мқён•ҳкё°' лІ„нҠјл§Ң лҲ„лҘҙл©ҙ мһҗлҸҷмңјлЎң мөңмӢ  м ңм•Ҳ лӘ©лЎқмқ„ л¶Ҳлҹ¬мҳЁлӢӨ.
        //     лҚ” мқҙмғҒ мҪ”л“ңлҘј ліөмӮ¬н•ҙм„ң л©”мӢңм§ҖлЎң ліҙлӮј н•„мҡ”к°Җ м—ҶлӢӨ.

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.innerText = str || '';
            return div.innerHTML;
        }

        function getTripDayCount() {
            if (!tripStart || !tripEnd) return 1;
            const diffTime = Math.abs(new Date(tripEnd) - new Date(tripStart));
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
        }

        let pendingSuggestPlace = null;
        let suggestAutocomplete = null;

        // ---- кІҢмҠӨнҠё(л°ӣмқҖ мӮ¬лһҢ) нҷ”л©ҙ: м ңм•Ҳ ліҙлӮҙкё° ----

        function openSuggestModal() {
            pendingSuggestPlace = null;
            const dayCount = getTripDayCount();
            let dayOptions = '';
            for (let d = 1; d <= dayCount; d++) {
                dayOptions += `<option value="${d}" ${d === currentDay ? 'selected' : ''}>${d}мқјм°Ё</option>`;
            }

            const root = document.getElementById('modal-root');
            root.innerHTML = `
                <div class="modal-overlay" id="suggest-modal-overlay">
                    <div class="modal-box">
                        <h3>рҹ’Ў мһҘмҶҢ м¶”к°Җ кұҙмқҳн•ҳкё°</h3>
                        <p style="font-size:12px; color:#7f8fa6; margin-top:-10px; margin-bottom:14px; line-height:1.6;">
                            м¶”к°Җн•ҳкі  мӢ¶мқҖ мһҘмҶҢлҘј кІҖмғүн•ҙм„ң м„ нғқн•ҳкі , мӣҗн•ҳлҠ” лӮ м§ңлҘј кі лҘё л’Ө ліҙлӮҙліҙм„ёмҡ”.<br>
                            нҢҢнӢ°мһҘм—җкІҢ <b>л°”лЎң м „лӢ¬</b>лҗҳкі , нҢҢнӢ°мһҘмқҙ нҷ•мқё нӣ„ мқјм •м—җ м¶”к°Җн•  мҲҳ мһҲм–ҙмҡ”.
                        </p>
                        <div class="modal-field">
                            <label>мһҘмҶҢ кІҖмғү</label>
                            <input type="text" id="suggest-place-input" placeholder="мһҘмҶҢ мқҙлҰ„мқ„ кІҖмғүн•ҳм„ёмҡ”">
                        </div>
                        <div class="modal-field">
                            <label>м¶”мІң лӮ м§ң</label>
                            <select id="suggest-day-select" style="width:100%; padding:10px; border:1px solid #dcdde1; border-radius:6px; font-size:15px; outline:none;">${dayOptions}</select>
                        </div>
                        <div class="modal-field">
                            <label>н•ңл§Ҳл”” (м„ нғқ)</label>
                            <input type="text" id="suggest-memo-input" placeholder="мҳҲ: м—¬кё° л””м ҖнҠё л§ӣм§‘мқҙлһҳмҡ”!">
                        </div>
                        <div class="modal-field">
                            <label>лӮҙ мқҙлҰ„ (м„ нғқ)</label>
                            <input type="text" id="suggest-name-input" placeholder="мҳҲ: лҜјмҲҳ">
                        </div>
                        <div class="modal-actions">
                            <button type="button" class="modal-btn secondary" onclick="closeModal()">м·ЁмҶҢ</button>
                            <button type="button" class="modal-btn primary" onclick="submitSuggestion()">м ңм•Ҳ ліҙлӮҙкё°</button>
                        </div>
                    </div>
                </div>
            `;

            const input = document.getElementById('suggest-place-input');
            if (window.google && google.maps && google.maps.places) {
                suggestAutocomplete = new google.maps.places.Autocomplete(input);
                if (map) suggestAutocomplete.bindTo('bounds', map);
                suggestAutocomplete.addListener('place_changed', () => {
                    const place = suggestAutocomplete.getPlace();
                    if (!place || !place.geometry) return;
                    pendingSuggestPlace = {
                        name: place.name,
                        address: place.formatted_address,
                        lat: place.geometry.location.lat(),
                        lng: place.geometry.location.lng()
                    };
                });
            }
        }

        async function submitSuggestion() {
            if (!currentSharedId) { alert('кіөмң  л§ҒнҒ¬ м •ліҙлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ. л§ҒнҒ¬лҘј лӢӨмӢң м—ҙм–ҙм„ң мӢңлҸ„н•ҙмЈјм„ёмҡ”.'); return; }
            if (!pendingSuggestPlace) { alert('кІҖмғү лӘ©лЎқм—җм„ң мһҘмҶҢлҘј м •нҷ•нһҲ нҒҙлҰӯн•ҙ м„ нғқн•ҙмЈјм„ёмҡ”.'); return; }

            const day = Number(document.getElementById('suggest-day-select').value) || 1;
            const memo = document.getElementById('suggest-memo-input').value.trim();
            const proposer = document.getElementById('suggest-name-input').value.trim();

            const payload = {
                day,
                name: pendingSuggestPlace.name,
                address: pendingSuggestPlace.address,
                lat: pendingSuggestPlace.lat,
                lng: pendingSuggestPlace.lng,
                memo, proposer,
                createdAt: Date.now()
            };

            try {
                const suggestionId = generateShortId();
                const res = await fetch(`${FIREBASE_DB_URL}/suggestions/${currentSharedId}/${suggestionId}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('save failed');
                closeModal();
                alert('м ңм•Ҳмқҙ нҢҢнӢ°мһҘм—җкІҢ м „лӢ¬лҗҳм—ҲмҠөлӢҲлӢӨ!');
            } catch (e) {
                alert('м ңм•Ҳ м „мҶЎ мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ. л„ӨнҠёмӣҢнҒ¬ мғҒнғңлҘј нҷ•мқён•ҳкі  лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.');
            }
        }

        // ---- нҢҢнӢ°мһҘ нҷ”л©ҙ: л°ӣмқҖ м ңм•Ҳ лӘ©лЎқ нҷ•мқё л°Ҹ л°ҳмҳҒ ----

        async function openReviewSuggestionModal() {
            if (!activeShareId) {
                alert('м•„м§Ғ л§Ңл“Өм–ҙм§„ кіөмң  л§ҒнҒ¬к°Җ м—Ҷм–ҙмҡ”. лЁјм Җ "ліҙкё° м „мҡ© кіөмң  л§ҒнҒ¬ л§Ңл“Өкё°"лЎң л§ҒнҒ¬лҘј н•ң лІҲ мғқм„ұн•ҙмЈјм„ёмҡ”.');
                return;
            }

            const root = document.getElementById('modal-root');
            root.innerHTML = `
                <div class="modal-overlay" id="review-suggestion-overlay">
                    <div class="modal-box">
                        <h3>рҹ’Ў л°ӣмқҖ м ңм•Ҳ нҷ•мқё</h3>
                        <p style="font-size:13px; color:#7f8fa6;">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</p>
                    </div>
                </div>
            `;

            try {
                const res = await fetch(`${FIREBASE_DB_URL}/suggestions/${activeShareId}.json`);
                const suggestions = await res.json();
                renderSuggestionList(suggestions || {});
            } catch (e) {
                root.innerHTML = '';
                alert('м ңм•Ҳ лӘ©лЎқмқ„ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ. мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.');
            }
        }

        function renderSuggestionList(suggestions) {
            const ids = Object.keys(suggestions);
            const root = document.getElementById('modal-root');

            const itemsHtml = ids.length === 0
                ? `<p style="font-size:13px; color:#7f8fa6; text-align:center; padding:20px 0;">м•„м§Ғ л°ӣмқҖ м ңм•Ҳмқҙ м—Ҷм–ҙмҡ”.</p>`
                : ids.sort((a, b) => (suggestions[a].createdAt || 0) - (suggestions[b].createdAt || 0)).map(id => {
                    const p = suggestions[id];
                    return `
                        <div class="modal-field" style="border:1px solid #f1f2f6; border-radius:10px; padding:12px;">
                            <div style="font-size:15px; font-weight:bold; color:#2d3436;">${escapeHtml(p.name)}</div>
                            <div style="font-size:12px; color:#7f8fa6; margin-top:2px;">${escapeHtml(p.address || '')}</div>
                            <div style="font-size:13px; color:#0984e3; font-weight:bold; margin-top:6px;">${p.day}мқјм°Ё м¶”мІң</div>
                            ${p.memo ? `<div style="font-size:13px; color:#2d3436; margin-top:4px;">рҹ’¬ ${escapeHtml(p.memo)}</div>` : ''}
                            ${p.proposer ? `<div style="font-size:12px; color:#7f8fa6; margin-top:2px;">ліҙлӮё мӮ¬лһҢ: ${escapeHtml(p.proposer)}</div>` : ''}
                            <div class="modal-actions" style="margin-top:10px;">
                                <button type="button" class="modal-btn secondary" onclick="rejectSuggestion('${id}')">л¬ҙмӢңн•ҳкё°</button>
                                <button type="button" class="modal-btn primary" onclick='acceptSuggestion("${id}")'>мқҙ лӮ м§ңм—җ м¶”к°Җн•ҳкё°</button>
                            </div>
                        </div>
                    `;
                }).join('<div style="height:10px;"></div>');

            root.innerHTML = `
                <div class="modal-overlay" id="review-suggestion-overlay">
                    <div class="modal-box" style="max-width:420px;">
                        <h3>рҹ’Ў л°ӣмқҖ м ңм•Ҳ (${ids.length}к°ң)</h3>
                        <div id="suggestion-list-container">${itemsHtml}</div>
                        <div class="modal-actions" style="margin-top:16px;">
                            <button type="button" class="modal-btn secondary" onclick="closeModal()">лӢ«кё°</button>
                        </div>
                    </div>
                </div>
            `;

            window.currentSuggestionsCache = suggestions;
        }

        async function acceptSuggestion(id) {
            const p = (window.currentSuggestionsCache || {})[id];
            if (!p) return;
            const day = p.day || 1;

            if (!plannerData[day]) plannerData[day] = [];
            const validList = plannerData[day].filter(i => i);
            let defaultTime = '10:00';
            if (validList.length > 0) defaultTime = validList[validList.length - 1].time || '10:00';

            let memo = '';
            if (p.memo && p.proposer) memo = `[м ңм•Ҳ В· ${p.proposer}] ${p.memo}`;
            else if (p.memo) memo = `[м ңм•Ҳ] ${p.memo}`;
            else if (p.proposer) memo = `[${p.proposer}лӢҳ м ңм•Ҳ]`;

            plannerData[day].push({
                name: p.name,
                address: p.address,
                lat: p.lat,
                lng: p.lng,
                time: defaultTime,
                memo
            });

            saveData();
            await deleteSuggestion(id);
            closeModal();
            changeDay(day);
            alert(`'${p.name}' мһҘмҶҢк°Җ ${day}мқјм°Ё мқјм •м—җ м¶”к°Җлҗҳм—ҲмҠөлӢҲлӢӨ!`);
        }

        async function rejectSuggestion(id) {
            await deleteSuggestion(id);
            if (window.currentSuggestionsCache) delete window.currentSuggestionsCache[id];
            renderSuggestionList(window.currentSuggestionsCache || {});
        }

        async function deleteSuggestion(id) {
            try {
                await fetch(`${FIREBASE_DB_URL}/suggestions/${activeShareId}/${id}.json`, { method: 'DELETE' });
            } catch (e) { /* мӮӯм ң мӢӨнҢЁн•ҙлҸ„ нҷ”л©ҙ нқҗлҰ„мқҖ л§үм§Җ м•ҠмқҢ */ }
        }

        function saveAllProjects() {
            localStorage.setItem('smartPlannerAllProjects', JSON.stringify(allProjects));
            scheduleBackupSync(); // рҹ’Ў м ҖмһҘн•  л•Ңл§ҲлӢӨ(л””л°”мҡҙмҠӨ) нҒҙлқјмҡ°л“ңм—җлҸ„ мЎ°мҡ©нһҲ л°ұм—…
        }

        /* ============ лҚ°мқҙн„° лӮҙліҙлӮҙкё° / к°Җм ёмҳӨкё° (кё°кё° к°„ мқҙлҸҷмҡ©) ============
           рҹ’Ў лӘЁл“  м—¬н–ү лҚ°мқҙн„°лҠ” localStorageм—җл§Ң м ҖмһҘлҗҳкё° л•Ңл¬ём—җ нҸ°кіј л…ёнҠёл¶Ғмқҳ м ҖмһҘ кіөк°„мқҙ
              м„ңлЎң лӢӨлҘҙлӢӨ. к·ёлһҳм„ң н•ңмӘҪ кё°кё°м—җм„ң JSON нҢҢмқјлЎң "лӮҙліҙлӮҙкё°" н•ң л’Ө, к·ё нҢҢмқјмқ„
              лӢӨлҘё кё°кё°м—җм„ң "к°Җм ёмҳӨкё°" н•ҳл©ҙ л‘җ кё°кё°мқҳ лҚ°мқҙн„°лҘј л§һм¶° м“ё мҲҳ мһҲлӢӨ. */
        function exportAllData() {
            try {
                const dataStr = JSON.stringify(allProjects, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const today = new Date().toISOString().slice(0, 10);
                a.href = url;
                a.download = `Triptic_л°ұм—…_${today}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (e) {
                alert('лҚ°мқҙн„° лӮҙліҙлӮҙкё° мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.');
            }
        }

        function importAllData(event) {
            const file = event.target.files[0];
            event.target.value = ''; // к°ҷмқҖ нҢҢмқјмқ„ лӢӨмӢң м„ нғқн•ҙлҸ„ change мқҙлІӨнҠёк°Җ л°ңмғқн•ҳлҸ„лЎқ мҙҲкё°нҷ”
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                let imported;
                try {
                    imported = JSON.parse(e.target.result);
                } catch (err) {
                    alert('мҳ¬л°”лҘё л°ұм—… нҢҢмқјмқҙ м•„лӢҷлӢҲлӢӨ.');
                    return;
                }
                if (!imported || typeof imported !== 'object') {
                    alert('мҳ¬л°”лҘё л°ұм—… нҢҢмқјмқҙ м•„лӢҷлӢҲлӢӨ.');
                    return;
                }

                const importNames = Object.keys(imported);
                const existingNames = Object.keys(allProjects);
                const overlap = importNames.filter(n => existingNames.includes(n));
                const overlapMsg = overlap.length > 0
                    ? `\n\nвҡ пёҸ мқҙлҰ„мқҙ к°ҷмқҖ м—¬н–ү ${overlap.length}к°ң(${overlap.join(', ')})лҠ” к°Җм ёмҳЁ нҢҢмқј лӮҙмҡ©мңјлЎң лҚ®м–ҙм”ҢмӣҢм§‘лӢҲлӢӨ.`
                    : '';

                const proceed = confirm(`${importNames.length}к°ңмқҳ м—¬н–үмқ„ к°Җм ёмҳөлӢҲлӢӨ. кё°мЎҙм—җ м ҖмһҘлҗң м—¬н–үмқҖ к·ёлҢҖлЎң мң м§Җлҗҳкі , мқҙ лӘ©лЎқм—җ м¶”к°Җ/лі‘н•©лҗ©лӢҲлӢӨ.${overlapMsg}`);
                if (!proceed) return;

                allProjects = { ...allProjects, ...imported };
                saveAllProjects();
                renderLobby();
                alert('к°Җм ёмҳӨкё°к°Җ мҷ„лЈҢлҗҳм—ҲмҠөлӢҲлӢӨ!');
            };
            reader.onerror = () => alert('нҢҢмқјмқ„ мқҪлҠ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.');
            reader.readAsText(file);
        }

        function saveData() {
            if (!activeProjectName) return;

            // рҹ’Ў л¬ҙкІ°м„ұ мһҗлҸҷ ліөкө¬ лЎңм§Ғ: м ҖмһҘ мӢң nullмқҙлӮҳ к№Ём§„ лҚ°мқҙн„° мӢ№ мІӯмҶҢ
            if (plannerData[currentDay]) {
                plannerData[currentDay] = plannerData[currentDay].filter(item => item && item.lat && item.lng);
            }

            allProjects[activeProjectName].data = plannerData;
            allProjects[activeProjectName].hotels = hotelsData;
            allProjects[activeProjectName].meals = mealsData;
            allProjects[activeProjectName].expenses = expensesData;
            allProjects[activeProjectName].flights = flightsData;
            allProjects[activeProjectName].currentDay = currentDay;
            allProjects[activeProjectName].city = tripCity;
            allProjects[activeProjectName].cityLat = tripCityLat;
            allProjects[activeProjectName].cityLng = tripCityLng;
            allProjects[activeProjectName].startDate = tripStart;
            allProjects[activeProjectName].endDate = tripEnd;
            allProjects[activeProjectName].shareId = activeShareId;
            allProjects[activeProjectName].lastModified = new Date().toLocaleDateString();

            saveAllProjects();
            scheduleShareSync(); // рҹ’Ў кіөмң  л§ҒнҒ¬к°Җ мқҙлҜё л§Ңл“Өм–ҙм§„ н”„лЎңм қнҠёлқјл©ҙ, лӘҮ мҙҲ нӣ„ Firebaseм—җлҸ„ мөңмӢ  лҚ°мқҙн„°лҘј л°ҳмҳҒн•ҙ мӢӨмӢңк°„ кіөмң к°Җ лҗҳкІҢ н•Ё
        }

        let shareSyncTimer = null;

        function scheduleShareSync() {
            if (!activeShareId) return;
            clearTimeout(shareSyncTimer);
            shareSyncTimer = setTimeout(pushShareUpdate, 1200); // м—°мҶҚ мһ…л Ҙ(нӮӨ мһ…л Ҙ л“ұ) мӨ‘м—” кі„мҶҚ лҜёлӨҳлӢӨк°Җ, мһ мһ н•ҙм§Җл©ҙ н•ң лІҲл§Ң м „мҶЎ
        }

        async function pushShareUpdate() {
            if (!activeShareId || !activeProjectName) return;
            const payload = {
                city: tripCity, cityLat: tripCityLat, cityLng: tripCityLng,
                startDate: tripStart, endDate: tripEnd,
                data: plannerData, hotels: hotelsData, meals: mealsData, expenses: expensesData, flights: flightsData
            };
            try {
                await fetch(`${FIREBASE_DB_URL}/shares/${activeShareId}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { /* мӢӨнҢЁн•ҙлҸ„ лӢӨмқҢ м ҖмһҘ л•Ң лӢӨмӢң мӢңлҸ„лҗҳлҜҖлЎң мЎ°мҡ©нһҲ л¬ҙмӢң */ }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('sidebar').className = mode + '-mode';
            document.getElementById('btn-edit').classList.toggle('active', mode === 'edit');
            document.getElementById('btn-view').classList.toggle('active', mode === 'view');
            if (mode === 'view') closeAllSections();
            handleRouteDisplay();
        }

        function renderTripInfoBar() {
            const el = document.getElementById('trip-info-text');
            if (!el) return;
            el.innerHTML = `<span class="city-name">рҹ“Қ ${tripCity || 'лҸ„мӢң лҜём„Өм •'}</span><br>${tripStart} ~ ${tripEnd}`;
        }

        /* ============ м ‘мқҙмӢқ м„№м…ҳ (мҲҷмҶҢ/мӢқмӮ¬/кІҪл№„) ============ */

        function closeAllSections() {
            ['hotel', 'meal', 'expense'].forEach(s => {
                document.getElementById(s + '-section').classList.remove('open');
            });
        }

        function toggleSection(section) {
            const el = document.getElementById(section + '-section');
            const isOpen = el.classList.contains('open');
            closeAllSections();
            if (!isOpen) {
                el.classList.add('open');
                if (section === 'hotel') renderHotelSection();
                if (section === 'meal') renderMealSection();
                if (section === 'expense') renderExpenseSection();
            }
        }

        function refreshExtraButtonStates() {
            const hotelBtn = document.getElementById('hotel-toggle-btn');
            const mealBtn = document.getElementById('meal-toggle-btn');
            const expenseBtn = document.getElementById('expense-toggle-btn');
            hotelBtn.classList.toggle('has-data', !!(hotelsData[currentDay] && hotelsData[currentDay].name));
            const m = mealsData[currentDay] || {};
            const hasMeal = ['breakfast', 'lunch', 'dinner'].some(k => m[k] && m[k].name && !m[k].skip);
            mealBtn.classList.toggle('has-data', hasMeal);
            const hasExpense = (expensesData[currentDay] || []).length > 0;
            expenseBtn.classList.toggle('has-data', hasExpense);
        }

        /* ---- н•ӯкіөнҺё ---- */

        // рҹ’Ў aviationstackмқҖ нҺёлӘ… мЎ°нҡҢ мқ‘лӢөм—җ кіөн•ӯ IATA мҪ”л“ңлҠ” мЈјм§Җл§Ң мң„кІҪлҸ„(мўҢн‘ң)лҠ” м•Ҳ мЈјкё° л•Ңл¬ём—җ,
        //    /v1/airports м—”л“ңнҸ¬мқёнҠёлЎң кіөн•ӯ мҪ”л“ң н•ҳлӮҳлӢ№ н•ң лІҲм”© мўҢн‘ңлҘј м¶”к°ҖлЎң мЎ°нҡҢн•ңлӢӨ.
        async function fetchAirportCoords(iataCode) {
            if (!iataCode) return null;
            try {
                const url = `https://api.aviationstack.com/v1/airports?access_key=${AVIATIONSTACK_API_KEY}&iata_code=${encodeURIComponent(iataCode)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('airport lookup failed');
                const json = await res.json();
                const a = json.data && json.data[0];
                if (!a) return null;
                return {
                    name: a.airport_name || iataCode,
                    lat: (a.latitude != null) ? Number(a.latitude) : null,
                    lng: (a.longitude != null) ? Number(a.longitude) : null
                };
            } catch (e) {
                return null; // кіөн•ӯ мўҢн‘ң мЎ°нҡҢк°Җ мӢӨнҢЁн•ҙлҸ„ мӢңк°„/нҺёлӘ… м •ліҙлҠ” кі„мҶҚ м“ё мҲҳ мһҲкІҢ мЎ°мҡ©нһҲ л„ҳм–ҙк°җ
            }
        }

        // рҹ’Ў aviationstackмқҳ scheduled мӢңк°Ғ(мҳҲ: "2026-08-01T13:30:00+00:00")м—җм„ң "HH:MM"л§Ң м¶”м¶ң
        function extractLocalTime(scheduledStr) {
            if (!scheduledStr) return '';
            const m = scheduledStr.match(/T(\d{2}:\d{2})/);
            return m ? m[1] : '';
        }

        // рҹ’Ў нҺёлӘ… + лӮ м§ңлЎң aviationstackм—җм„ң мӢӨм ң м¶ңл°ң/лҸ„м°© мӢңк°Ғкіј кіөн•ӯ мўҢн‘ңлҘј мЎ°нҡҢн•ңлӢӨ.
        //    нӮӨк°Җ м„Өм •лҗҳм§Җ м•Ҡм•ҳкұ°лӮҳ мЎ°нҡҢм—җ мӢӨнҢЁн•ҳл©ҙ nullмқ„ л°ҳнҷҳн•ҳкі , мқҙ кІҪмҡ° нҺёлӘ…л§Ң м ҖмһҘлҗҳкі 
        //    мһҗлҸҷ мӢңк°„/кіөн•ӯ мұ„мҡ°кё°лҠ” мғқлһөлҗңлӢӨ (кё°лҠҘ мһҗмІҙлҠ” кі„мҶҚ м„ нғқ мӮ¬н•ӯмңјлЎң лҸҷмһ‘).
        //    вҡ пёҸ aviationstack л¬ҙлЈҢ н”ҢлһңмқҖ flight_dateлЎң лҜёлһҳ лӮ м§ңлҘј мЎ°нҡҢн•ҳлҠ” кІҢ м ңн•ңлҗ  мҲҳ мһҲкі ,
        //       л¬ҙлЈҢ н”ҢлһңмқҖ httpsк°Җ м•„лӢҢ httpл§Ң н—Ҳмҡ©лҗҳлҠ” кІҪмҡ°к°Җ мһҲм–ҙ лёҢлқјмҡ°м Җм—җм„ң л§үнһҗ мҲҳ мһҲлӢӨ.
        //       мЎ°нҡҢк°Җ кі„мҶҚ мӢӨнҢЁн•ҳл©ҙ aviationstack лҢҖмӢңліҙл“ңм—җм„ң н”Ңлһң/мӮ¬мҡ©лҹүмқ„ нҷ•мқён•ҙліҙм„ёмҡ”.
        async function lookupFlight(flightNo, dateStr) {
            if (!flightNo || !dateStr) return null;

            if (!AVIATIONSTACK_API_KEY || AVIATIONSTACK_API_KEY.indexOf('YOUR_') === 0) {
                alert('н•ӯкіөнҺё мһҗлҸҷ мЎ°нҡҢлҘј мӮ¬мҡ©н•ҳл Өл©ҙ лЁјм Җ aviationstack API нӮӨк°Җ н•„мҡ”н•ҙмҡ”.\nмҪ”л“ң мғҒлӢЁмқҳ AVIATIONSTACK_API_KEY к°’мқ„ ліёмқёмқҳ нӮӨлЎң көҗмІҙн•ҙмЈјм„ёмҡ”.\n(нӮӨк°Җ м—Ҷм–ҙлҸ„ нҺёлӘ…л§Ң м§Ғм ‘ л©”лӘЁлЎң лӮЁкё°лҠ” кІғмқҖ к°ҖлҠҘн•©лӢҲлӢӨ)');
                return null;
            }

            try {
                const url = `https://api.aviationstack.com/v1/flights?access_key=${AVIATIONSTACK_API_KEY}&flight_iata=${encodeURIComponent(flightNo.trim())}&flight_date=${dateStr}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('lookup failed');
                const json = await res.json();
                if (json.error) throw new Error(json.error.message || 'api error');

                const list = json.data;
                if (!Array.isArray(list) || list.length === 0) throw new Error('not found');

                const f = list[0];
                const dep = f.departure || {};
                const arr = f.arrival || {};

                const [depCoords, arrCoords] = await Promise.all([
                    fetchAirportCoords(dep.iata),
                    fetchAirportCoords(arr.iata)
                ]);

                return {
                    flightNo: flightNo.trim().toUpperCase(),
                    date: dateStr,
                    dep: {
                        iata: dep.iata || '',
                        name: (depCoords && depCoords.name) || dep.airport || dep.iata || '',
                        lat: depCoords ? depCoords.lat : null,
                        lng: depCoords ? depCoords.lng : null,
                        time: extractLocalTime(dep.scheduled)
                    },
                    arr: {
                        iata: arr.iata || '',
                        name: (arrCoords && arrCoords.name) || arr.airport || arr.iata || '',
                        lat: arrCoords ? arrCoords.lat : null,
                        lng: arrCoords ? arrCoords.lng : null,
                        time: extractLocalTime(arr.scheduled)
                    }
                };
            } catch (e) {
                alert(`'${flightNo}' н•ӯкіөнҺё м •ліҙлҘј мЎ°нҡҢн•ҳм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ. нҺёлӘ…кіј лӮ м§ңлҘј нҷ•мқён•ҙмЈјм„ёмҡ”.`);
                return null;
            }
        }

        // рҹ’Ў мғқм„ұ/мҲҳм • лӘЁлӢ¬мқҳ "мЎ°нҡҢ" лІ„нҠј нҒҙлҰӯ н•ёл“Өлҹ¬. type: 'outbound' | 'return', prefix: 'new' | 'edit'
        async function lookupFlightForModal(type, prefix) {
            const codeInput = document.getElementById(`${prefix}-${type}-flight-input`);
            const previewEl = document.getElementById(`${prefix}-${type}-flight-preview`);
            const code = codeInput.value.trim();
            if (!code) { alert('н•ӯкіөнҺё мҪ”л“ңлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }

            const dateInput = document.getElementById(type === 'outbound' ? `${prefix}-start-input` : `${prefix}-end-input`);
            const dateVal = dateInput ? dateInput.value : '';
            if (!dateVal) { alert('лЁјм Җ м—¬н–ү кё°к°„(лӮ м§ң)мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }

            previewEl.innerText = 'мЎ°нҡҢ мӨ‘...';
            const result = await lookupFlight(code, dateVal);
            if (result) {
                pendingFlights[type] = result;
                previewEl.innerHTML = flightPreviewText(result);
            } else {
                pendingFlights[type] = null;
                previewEl.innerHTML = '';
            }
        }

        function flightPreviewText(f) {
            if (!f) return '';
            const airlineText = f.airline ? `${f.airline} В· ` : '';
            const depText = f.dep.iata || f.dep.name || '?';
            const arrText = f.arr.iata || f.arr.name || '?';
            return `вң… ${airlineText}${depText} ${f.dep.time || ''} м¶ңл°ң вҶ’ ${arrText} ${f.arr.time || ''} лҸ„м°©${f.manual ? ' (м§Ғм ‘ мһ…л Ҙ)' : ''}`;
        }

        /* ---- н•ӯкіөнҺё мҲҳлҸҷ мһ…л Ҙ ----
           рҹ’Ў aviationstack л¬ҙлЈҢ н”ҢлһңмқҖ лҜёлһҳ лӮ м§ңмқҳ л№„н–үнҺёмқ„ мЎ°нҡҢн•ҳм§Җ лӘ»н•ҳлҠ” кІҪмҡ°к°Җ л§ҺлӢӨ.
              к·ёлҹ° кІҪмҡ°лҘј мң„н•ҙ, нҺёлӘ…/н•ӯкіөмӮ¬/м¶ңл°ңкіөн•ӯ/лҸ„м°©кіөн•ӯ/мқҙлҘҷмӢңк°„/м°©лҘҷмӢңк°„мқ„ м§Ғм ‘ мһ…л Ҙн•ҙм„ң
              lookupFlight()к°Җ л°ҳнҷҳн•ҳлҠ” кІғкіј к°ҷмқҖ лӘЁм–‘мқҳ к°қмІҙлҘј л§Ңл“Өм–ҙ pendingFlightsм—җ л°”лЎң лӢҙлҠ”лӢӨ.
              (кіөн•ӯ мқҙлҰ„ мһ…л Ҙм°Ҫм—җм„ң кө¬кёҖ мһҘмҶҢ мһҗлҸҷмҷ„м„ұмңјлЎң н•ӯлӘ©мқ„ м„ нғқн•ҳл©ҙ мң„кІҪлҸ„лҸ„ н•Ёк»ҳ м ҖмһҘлҗҳм–ҙ,
              м§ҖлҸ„ л”Ҙл§ҒнҒ¬("кө¬кёҖ л§өмҠӨм—җм„ң кІҪлЎң ліҙкё°")лҸ„ к·ёлҢҖлЎң мӮ¬мҡ©н•  мҲҳ мһҲлӢӨ. м„ нғқн•ҳм§Җ м•Ҡкі  к·ёлғҘ
              н…ҚмҠӨнҠёл§Ң мһ…л Ҙн•ҙлҸ„ н•ӯкіөнҺё м№ҙл“ң мһҗмІҙлҠ” м •мғҒм ҒмңјлЎң н‘ңмӢңлҗңлӢӨ.) */

        function flightManualFieldsHTML(type, prefix, existing) {
            const isManual = !!(existing && existing.manual);
            const airlineVal = (existing && existing.airline) || '';
            const depNameVal = (existing && existing.dep && existing.dep.name) || '';
            const depTimeVal = (existing && existing.dep && existing.dep.time) || '';
            const arrNameVal = (existing && existing.arr && existing.arr.name) || '';
            const arrTimeVal = (existing && existing.arr && existing.arr.time) || '';
            return `
                <div class="flight-manual-toggle" onclick="toggleManualFlight('${type}','${prefix}')">вңҸпёҸ м§Ғм ‘ мһ…л Ҙн•ҳкё° (мЎ°нҡҢк°Җ м•Ҳлҗ  мӢң)</div>
                <div class="flight-manual-fields${isManual ? ' open' : ''}" id="${prefix}-${type}-manual-fields">
                    <div class="modal-field">
                        <label>н•ӯкіөмӮ¬</label>
                        <input type="text" id="${prefix}-${type}-airline-input" value="${airlineVal}" placeholder="мҳҲ: лҢҖн•ңн•ӯкіө">
                    </div>
                    <div class="modal-field">
                        <label>м¶ңл°ң кіөн•ӯ</label>
                        <input type="text" id="${prefix}-${type}-depairport-input" value="${depNameVal}" placeholder="кіөн•ӯ кІҖмғү (мҳҲ: мқёмІңкөӯм ңкіөн•ӯ)">
                    </div>
                    <div class="modal-field">
                        <label>мқҙлҘҷ мӢңк°„</label>
                        <input type="time" id="${prefix}-${type}-deptime-input" value="${depTimeVal}">
                    </div>
                    <div class="modal-field">
                        <label>лҸ„м°© кіөн•ӯ</label>
                        <input type="text" id="${prefix}-${type}-arrairport-input" value="${arrNameVal}" placeholder="кіөн•ӯ кІҖмғү (мҳҲ: лӮҳлҰ¬нғҖ көӯм ңкіөн•ӯ)">
                    </div>
                    <div class="modal-field">
                        <label>м°©лҘҷ мӢңк°„</label>
                        <input type="time" id="${prefix}-${type}-arrtime-input" value="${arrTimeVal}">
                    </div>
                    <button type="button" class="modal-btn primary manual-flight-save-btn" onclick="saveManualFlight('${type}','${prefix}')">мқҙ м •ліҙлЎң м ҖмһҘ</button>
                </div>
            `;
        }

        function toggleManualFlight(type, prefix) {
            const el = document.getElementById(`${prefix}-${type}-manual-fields`);
            if (!el) return;
            el.classList.toggle('open');
            if (el.classList.contains('open')) initManualAirportAutocomplete(type, prefix);
        }

        // рҹ’Ў м¶ңл°ң/лҸ„м°© кіөн•ӯ мһ…л Ҙм°Ҫм—җ кө¬кёҖ мһҘмҶҢ мһҗлҸҷмҷ„м„ұмқ„ л¶ҷм—¬, м„ нғқ мӢң мң„кІҪлҸ„лҘј pendingManualAirportм—җ м ҖмһҘн•ҙл‘”лӢӨ.
        function initManualAirportAutocomplete(type, prefix) {
            if (!(window.google && google.maps && google.maps.places)) return;
            const depInput = document.getElementById(`${prefix}-${type}-depairport-input`);
            const arrInput = document.getElementById(`${prefix}-${type}-arrairport-input`);

            if (depInput && !depInput._acAttached) {
                const ac = new google.maps.places.Autocomplete(depInput);
                ac.addListener('place_changed', () => {
                    const place = ac.getPlace();
                    if (place && place.geometry) {
                        pendingManualAirport[type].dep = {
                            name: place.name || place.formatted_address || depInput.value.trim(),
                            lat: place.geometry.location.lat(),
                            lng: place.geometry.location.lng()
                        };
                        depInput.dataset.lastSelected = depInput.value;
                    }
                });
                // рҹ’Ў мһҗлҸҷмҷ„м„ұмңјлЎң мўҢн‘ңлҘј м„ нғқн•ҙл‘” л’Өм—җ н…ҚмҠӨнҠёлҘј м§Ғм ‘ лҚ” кі м№ҳл©ҙ, мўҢн‘ңмҷҖ мқҙлҰ„мқҙ м–ҙкёӢлӮ  мҲҳ мһҲмңјлӢҲ
                //    мўҢн‘ңлҠ” лІ„лҰ¬кі  мқҙлҰ„л§Ң м“°лҸ„лЎқ л¬ҙнҡЁнҷ”н•ңлӢӨ (place_changedк°Җ лӢӨмӢң к°’мқ„ мұ„мӣҢмЈјлҠ” мҲңк°„мқҖ мҳҲмҷё).
                depInput.addEventListener('input', () => {
                    if (depInput.value !== depInput.dataset.lastSelected) pendingManualAirport[type].dep = null;
                });
                depInput._acAttached = true;
            }
            if (arrInput && !arrInput._acAttached) {
                const ac2 = new google.maps.places.Autocomplete(arrInput);
                ac2.addListener('place_changed', () => {
                    const place = ac2.getPlace();
                    if (place && place.geometry) {
                        pendingManualAirport[type].arr = {
                            name: place.name || place.formatted_address || arrInput.value.trim(),
                            lat: place.geometry.location.lat(),
                            lng: place.geometry.location.lng()
                        };
                        arrInput.dataset.lastSelected = arrInput.value;
                    }
                });
                arrInput.addEventListener('input', () => {
                    if (arrInput.value !== arrInput.dataset.lastSelected) pendingManualAirport[type].arr = null;
                });
                arrInput._acAttached = true;
            }
        }

        // рҹ’Ў "мқҙ м •ліҙлЎң м ҖмһҘ" нҒҙлҰӯ н•ёл“Өлҹ¬. нҺёлӘ…(мғҒлӢЁ мһ…л Ҙм°Ҫ) + мҲҳлҸҷ мһ…л Ҙ н•„л“ңл“Өмқ„ лӘЁм•„
        //    lookupFlight()мҷҖ к°ҷмқҖ лӘЁм–‘мқҳ к°қмІҙлЎң л§Ңл“Өм–ҙ pendingFlights[type]м—җ нҷ•м •н•ҙ л„ЈлҠ”лӢӨ.
        function saveManualFlight(type, prefix) {
            const flightNoInput = document.getElementById(`${prefix}-${type}-flight-input`);
            const flightNo = flightNoInput.value.trim();
            const airline = document.getElementById(`${prefix}-${type}-airline-input`).value.trim();
            const depAirportInput = document.getElementById(`${prefix}-${type}-depairport-input`);
            const arrAirportInput = document.getElementById(`${prefix}-${type}-arrairport-input`);
            const depTime = document.getElementById(`${prefix}-${type}-deptime-input`).value;
            const arrTime = document.getElementById(`${prefix}-${type}-arrtime-input`).value;

            if (!flightNo) { alert('нҺёлӘ…мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”. (мң„мӘҪ "нҺёлӘ… мһ…л Ҙ" м№ё)'); return; }
            if (!depAirportInput.value.trim() || !arrAirportInput.value.trim()) { alert('м¶ңл°ң кіөн•ӯкіј лҸ„м°© кіөн•ӯмқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }

            // рҹ’Ў мһҗлҸҷмҷ„м„ұм—җм„ң мўҢн‘ңлҘј м„ нғқн•ҙл‘” мғҒнғң к·ёлҢҖлЎңл©ҙ к·ё мўҢн‘ңлҘј м“°кі , к·ёл Үм§Җ м•Ҡмңјл©ҙ(м„ нғқ м•Ҳ н•Ё/мқҙнӣ„ м§Ғм ‘ мҲҳм •)
            //    мўҢн‘ң м—Ҷмқҙ мқҙлҰ„ н…ҚмҠӨнҠёл§Ң м ҖмһҘн•ңлӢӨ. мўҢн‘ңк°Җ м—Ҷм–ҙлҸ„ н•ӯкіөнҺё м№ҙл“ң н‘ңмӢңм—” л¬ём ң м—Ҷкі , м§ҖлҸ„ л”Ҙл§ҒнҒ¬л§Ң мғқлһөлҗңлӢӨ.
            const depCoord = pendingManualAirport[type].dep;
            const arrCoord = pendingManualAirport[type].arr;

            pendingFlights[type] = {
                flightNo: flightNo.toUpperCase(),
                date: '',
                airline: airline,
                manual: true,
                dep: {
                    iata: '',
                    name: (depCoord && depCoord.name) || depAirportInput.value.trim(),
                    lat: depCoord ? depCoord.lat : null,
                    lng: depCoord ? depCoord.lng : null,
                    time: depTime || ''
                },
                arr: {
                    iata: '',
                    name: (arrCoord && arrCoord.name) || arrAirportInput.value.trim(),
                    lat: arrCoord ? arrCoord.lat : null,
                    lng: arrCoord ? arrCoord.lng : null,
                    time: arrTime || ''
                }
            };

            const previewEl = document.getElementById(`${prefix}-${type}-flight-preview`);
            if (previewEl) previewEl.innerHTML = flightPreviewText(pendingFlights[type]);

            // рҹ’Ў м ҖмһҘ нӣ„м—” лӢӨмӢң м ‘м–ҙм„ң, мқҙлҜё мһ…л Ҙлҗң м •ліҙлҠ” мң„мӘҪ лҜёлҰ¬ліҙкё° н•ң мӨ„лЎңл§Ң нҷ•мқён•ҳкІҢ н•ңлӢӨ
            const manualFieldsEl = document.getElementById(`${prefix}-${type}-manual-fields`);
            if (manualFieldsEl) manualFieldsEl.classList.remove('open');
        }

        /* ---- мҲҷмҶҢ ---- */

        // рҹ’Ў нҠ№м • лӮ м§ңк№Ңм§Җ к°ҖмһҘ мөңк·јм—җ "лӘ…мӢңм ҒмңјлЎң" мһ…л Ҙлҗң мҲҷмҶҢлҘј м°ҫлҠ”лӢӨ (лҜёмһ…л Ҙ мӢң мқҙм „ лӮ м§ң мҲҷмҶҢлҘј к·ёлҢҖлЎң мқҙм–ҙм„ң мӮ¬мҡ©)
        function getEffectiveHotel(day) {
            for (let d = day; d >= 1; d--) {
                if (hotelsData[d] && hotelsData[d].name) return hotelsData[d];
            }
            return null;
        }

        // рҹ’Ў н•ҳлЈЁмқҳ мӢңмһ‘(м „лӮ  л°Ө л¬өмқҖ мҲҷмҶҢ)кіј лҒқ(к·ёлӮ  л°Ө л¬өмқ„ мҲҷмҶҢ)мқ„ кі„мӮ°
        //    - 1мқјм°ЁлҠ” м—¬н–үм§Җм—җ "лҸ„м°©"н•ҳлҠ” лӮ мқҙлҜҖлЎң м¶ңл°ң мҲҷмҶҢк°Җ м—ҶлӢӨ (к·ёлӮ  л°Ө мҲҷмҶҢл§Ң л§Ҳм§Җл§үм—җ н‘ңмӢң)
        //    - 2мқјм°Ёл¶Җн„°лҠ” "мқҙм „ лӮ м§ңмқҳ мң нҡЁ мҲҷмҶҢ"к°Җ к·ёлӮ мқҳ м¶ңл°ңм җмқҙ лҗңлӢӨ
        //    - нҠ№м • лӮ м§ңм—җ мҲҷмҶҢлҘј мһ…л Ҙн•ҳм§Җ м•Ҡмңјл©ҙ, к·ё мқҙм „м—җ мһ…л Ҙлҗң мҲҷмҶҢлҘј кі„мҶҚ мӮ¬мҡ©н•ң кІғмңјлЎң к°„мЈјн•ңлӢӨ
        //      (мҳҲ: 1мқјм°Ём—җл§Ң мҲҷмҶҢлҘј мһ…л Ҙн•ҳкі  лӮҳлЁём§ҖлҘј л№„мӣҢл‘җл©ҙ м „мІҙ м—¬н–ү лӮҙлӮҙ к°ҷмқҖ мҲҷмҶҢлҘј м“°лҠ” кІғмңјлЎң мІҳлҰ¬)
        //    - м—¬н–ү л§Ҳм§Җл§ү лӮ мқҖ мҲҷмҶҢлЎң "ліөк·Җ"н•ҳлҠ” кІҢ м•„лӢҲлқј кіөн•ӯмңјлЎң к°Җм„ң к·Җкөӯн•ҳлҠ” лӮ мқҙлҜҖлЎң
        //      к·ёлӮ  л°Ө л¬өмқ„ мҲҷмҶҢ(endHotel)лҠ” м—ҶлҠ” кІғмңјлЎң мІҳлҰ¬н•ңлӢӨ.
        function getDayHotels(day) {
            const isLastDay = day >= getTripDayCount();
            const endHotel = isLastDay ? null : getEffectiveHotel(day);
            const startHotel = day > 1 ? getEffectiveHotel(day - 1) : null;
            return { startHotel, endHotel };
        }

        function renderHotelSection() {
            const input = document.getElementById('hotel-input');
            input.value = (hotelsData[currentDay] && hotelsData[currentDay].name) || '';
            if (window.google && google.maps && google.maps.places) {
                hotelAutocomplete = new google.maps.places.Autocomplete(input);
                hotelAutocomplete.bindTo('bounds', map);
                hotelAutocomplete.addListener('place_changed', () => {
                    const place = hotelAutocomplete.getPlace();
                    if (!place || !place.geometry) return;
                    hotelsData[currentDay] = {
                        name: place.name,
                        address: place.formatted_address,
                        lat: place.geometry.location.lat(),
                        lng: place.geometry.location.lng()
                    };
                    saveData();
                    renderList(); updateMarkers(); refreshExtraButtonStates();
                });
            }
        }

        function clearHotel() {
            delete hotelsData[currentDay];
            document.getElementById('hotel-input').value = '';
            saveData();
            renderList(); updateMarkers(); refreshExtraButtonStates();
        }

        /* ---- мӢқмӮ¬ ---- */

        function renderMealSection() {
            const content = document.getElementById('meal-section-content');
            const dayMeals = mealsData[currentDay] || {};
            content.innerHTML = Object.keys(MEAL_META).map(slot => {
                const meta = MEAL_META[slot];
                const info = dayMeals[slot] || {};
                const skipped = !!info.skip;
                return `
                    <div class="meal-row">
                        <div class="meal-label">${meta.emoji} ${meta.label}</div>
                        <input type="text" class="meal-input" id="meal-input-${slot}" placeholder="${meta.label} мӢқлӢ№ кІҖмғү" value="${info.name || ''}" ${skipped ? 'disabled' : ''}>
                        <label class="meal-skip-label">
                            <input type="checkbox" id="meal-skip-${slot}" onchange="toggleMealSkip('${slot}', this.checked)" ${skipped ? 'checked' : ''}>
                            кұҙл„Ҳлӣ°кё°
                        </label>
                    </div>
                `;
            }).join('');

            Object.keys(MEAL_META).forEach(slot => {
                const input = document.getElementById(`meal-input-${slot}`);
                if (!input || input.disabled) return;
                if (window.google && google.maps && google.maps.places) {
                    const ac = new google.maps.places.Autocomplete(input);
                    ac.bindTo('bounds', map);
                    ac.addListener('place_changed', () => {
                        const place = ac.getPlace();
                        if (!place || !place.geometry) return;
                        selectMeal(slot, {
                            name: place.name,
                            address: place.formatted_address,
                            lat: place.geometry.location.lat(),
                            lng: place.geometry.location.lng()
                        });
                    });
                    mealAutocompletes[slot] = ac;
                }
            });
        }

        function selectMeal(slot, place) {
            if (!mealsData[currentDay]) mealsData[currentDay] = {};
            mealsData[currentDay][slot] = { ...place, skip: false };
            syncMealItemsIntoList();
            saveData();
            renderList(); updateMarkers(); refreshExtraButtonStates();
        }

        function toggleMealSkip(slot, checked) {
            if (!mealsData[currentDay]) mealsData[currentDay] = {};
            if (checked) {
                mealsData[currentDay][slot] = { skip: true };
            } else {
                mealsData[currentDay][slot] = { skip: false };
            }
            syncMealItemsIntoList();
            saveData();
            renderMealSection();
            renderList(); updateMarkers(); refreshExtraButtonStates();
        }

        // plannerData л°°м—ҙм—җ мӢқмӮ¬ н•ӯлӘ©мқ„ мһҗлҸҷ л°ҳмҳҒ (мӢңк°„мҲң м •л ¬)
        function syncMealItemsIntoList() {
            if (!plannerData[currentDay]) plannerData[currentDay] = [];
            const dayMeals = mealsData[currentDay] || {};

            // кё°мЎҙ мӢқмӮ¬ н•ӯлӘ© м „л¶Җ м ңкұ° нӣ„ лӢӨмӢң мӮҪмһ…
            plannerData[currentDay] = plannerData[currentDay].filter(item => !item.mealType);

            Object.keys(MEAL_META).forEach(slot => {
                const info = dayMeals[slot];
                if (info && info.name && !info.skip) {
                    plannerData[currentDay].push({
                        name: info.name,
                        address: info.address,
                        lat: info.lat,
                        lng: info.lng,
                        time: MEAL_META[slot].time,
                        memo: '',
                        mealType: slot
                    });
                }
            });

            plannerData[currentDay].sort((a, b) => (a.time || '00:00').localeCompare(b.time || '00:00'));
        }

        /* ---- кІҪл№„ ---- */

        function renderExpenseSection() {
            const content = document.getElementById('expense-section-content');
            const list = expensesData[currentDay] || [];
            const dayTotal = list.reduce((sum, e) => sum + (Number(e.amount) || 0), 0);

            let grandTotal = 0;
            Object.keys(expensesData).forEach(d => {
                (expensesData[d] || []).forEach(e => { grandTotal += (Number(e.amount) || 0); });
            });

            content.innerHTML = `
                <div class="expense-row">
                    <input type="text" class="expense-desc" id="expense-desc-input" placeholder="мӮ¬мҡ©мІҳ (мҳҲ: м җмӢ¬ мӢқмӮ¬)">
                    <input type="number" class="expense-amount" id="expense-amount-input" placeholder="кёҲм•Ў">
                    <button type="button" class="expense-add-btn" onclick="addExpense()">м¶”к°Җ</button>
                </div>
                <div class="expense-list">
                    ${list.map((e, i) => `
                        <div class="expense-list-item">
                            <span class="exp-desc">${e.desc}</span>
                            <span class="exp-amount">${Number(e.amount).toLocaleString()}мӣҗ</span>
                            <button type="button" class="expense-del" onclick="deleteExpense(${i})">мӮӯм ң</button>
                        </div>
                    `).join('') || '<p style="font-size:12px;color:#b2bec3;">м•„м§Ғ л“ұлЎқлҗң кІҪл№„к°Җ м—ҶмҠөлӢҲлӢӨ.</p>'}
                </div>
                <div class="expense-day-total"><span>мқҙ лӮ  н•©кі„</span><span>${dayTotal.toLocaleString()}мӣҗ</span></div>
                <div class="expense-grand-total"><span>м „мІҙ м—¬н–ү н•©кі„</span><span>${grandTotal.toLocaleString()}мӣҗ</span></div>
            `;
        }

        function addExpense() {
            const desc = document.getElementById('expense-desc-input').value.trim();
            const amount = Number(document.getElementById('expense-amount-input').value);
            if (!desc || !amount) { alert('мӮ¬мҡ©мІҳмҷҖ кёҲм•Ўмқ„ лӘЁл‘җ мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }

            if (!expensesData[currentDay]) expensesData[currentDay] = [];
            expensesData[currentDay].push({ desc, amount });
            saveData();
            renderExpenseSection();
            refreshExtraButtonStates();
        }

        function deleteExpense(index) {
            expensesData[currentDay].splice(index, 1);
            saveData();
            renderExpenseSection();
            refreshExtraButtonStates();
        }

        /* ============ мқјм •(лӮ м§ң) кҙҖлҰ¬ ============ */

        function generateHourOptions(selectedHour) {
            let html = '';
            for (let h = 0; h < 24; h++) {
                const hh = String(h).padStart(2, '0');
                html += `<option value="${hh}" ${hh === selectedHour ? 'selected' : ''}>${hh}мӢң</option>`;
            }
            return html;
        }

        function generateMinuteOptions(selectedMinute) {
            let html = '';
            for (let m = 0; m < 60; m += 5) {
                const mm = String(m).padStart(2, '0');
                html += `<option value="${mm}" ${mm === selectedMinute ? 'selected' : ''}>${mm}л¶„</option>`;
            }
            return html;
        }

        function generateSchedule(isLoad = false) {
            if (!tripStart || !tripEnd) return;
            const startDate = new Date(tripStart);
            const endDate = new Date(tripEnd);
            if (startDate > endDate) { alert('мў…лЈҢмқјмқҙ м¶ңл°ңмқјліҙлӢӨ л№ лҘј мҲҳ м—ҶмҠөлӢҲлӢӨ.'); return; }

            const diffTime = Math.abs(endDate - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            totalTripDays = diffDays;

            if (!isLoad) plannerData = {};
            tripDates = {};
            const container = document.getElementById('day-tabs-container');
            container.innerHTML = '';

            for (let i = 1; i <= diffDays; i++) {
                let activeDate = new Date(startDate);
                activeDate.setDate(startDate.getDate() + (i - 1));
                let dateString = `${activeDate.getMonth() + 1}/${activeDate.getDate()}`;
                tripDates[i] = activeDate;

                if (!isLoad) plannerData[i] = [];
                if (isLoad && !plannerData[i]) plannerData[i] = [];

                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `day-tab ${i === currentDay ? 'active' : ''}`;
                btn.id = `tab-day-${i}`;
                btn.innerText = `${i}мқјм°Ё (${dateString})`;
                btn.onclick = () => changeDay(i);
                container.appendChild(btn);
            }

            if (currentDay > diffDays) currentDay = diffDays;

            renderTripInfoBar();
            saveData();
            if (!isLoad) changeDay(1);
            else changeDay(currentDay);
        }

        function changeDay(day) {
            currentDay = day;
            document.querySelectorAll('.day-tab').forEach(tab => tab.classList.remove('active'));
            const selectedTab = document.getElementById(`tab-day-${day}`);
            if (selectedTab) selectedTab.classList.add('active');

            closeAllSections();
            saveData();
            renderList(); updateMarkers(); refreshExtraButtonStates();
        }

        function updateTime(index, val, type) {
            let parts = plannerData[currentDay][index].time.split(':');
            if (type === 'hour') parts[0] = val;
            else parts[1] = val;
            plannerData[currentDay][index].time = parts.join(':');
            saveData();
        }

        function updateMemo(index, val) {
            plannerData[currentDay][index].memo = val;
            saveData();
        }

        /* ============ л“ңлһҳк·ё м •л ¬ ============ */

        function initSortable() {
            const el = document.getElementById('planner-list-container');
            if (sortableInstance) sortableInstance.destroy();

            sortableInstance = new Sortable(el, {
                handle: '.drag-handle',
