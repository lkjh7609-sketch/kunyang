                draggable: '.place-item',   // рҹ’Ў place-itemл§Ң л“ңлһҳк·ё лҢҖмғҒмңјлЎң мқёмӢқ (кІҪлЎң л§ҒнҒ¬/кі м • мҲҷмҶҢ н•ӯлӘ© м ңмҷё)
                animation: 150,
                ghostClass: 'sortable-ghost',
                forceFallback: true,        // рҹ’Ў л„ӨмқҙнӢ°лёҢ HTML5 л“ңлһҳк·ё лҢҖмӢ  мһҗмІҙ кө¬нҳ„ мӮ¬мҡ© (лӘЁл°”мқј/н„°м№ҳм—җм„ң нӣЁм”¬ м•Ҳм •м Ғ)
                fallbackTolerance: 3,
                delay: 100,
                delayOnTouchOnly: true,
                touchStartThreshold: 5,
                onEnd: function (evt) {
                    const fromIndex = evt.oldIndex;
                    const toIndex = evt.newIndex;
                    if (fromIndex === undefined || toIndex === undefined || fromIndex === toIndex) {
                        renderList();
                        return;
                    }
                    // рҹ’Ў #planner-list-containerмқҳ м§ҒмҶҚ мһҗмӢқмқҖ мқҙм ң .place-itemлҝҗмқҙлҜҖлЎң
                    //    evt.oldIndex / evt.newIndexк°Җ plannerData л°°м—ҙ мқёлҚұмҠӨмҷҖ м •нҷ•нһҲ мқјм№ҳн•ңлӢӨ.
                    //    лҒҢм–ҙмҳЁ н•ӯлӘ©мқ„ лҶ“мқҖ мң„м№ҳлЎң "мқҙлҸҷ"мӢңнӮӨкі  лӮҳлЁём§ҖлҠ” мһҗм—°мҠӨлҹҪкІҢ н•ң м№ём”© л°ҖлҰ°лӢӨ.
                    const list = plannerData[currentDay];
                    const moved = list.splice(fromIndex, 1)[0];
                    list.splice(toIndex, 0, moved);
                    saveData();
                    renderList();
                    updateMarkers();
                }
            });
        }

        /* ============ лҰ¬мҠӨнҠё л ҢлҚ”л§Ғ ============ */

        // рҹ’Ў л‘җ м§Җм җ мӮ¬мқҙмқҳ "кө¬кёҖ л§өмҠӨ лҢҖмӨ‘көҗнҶө кІҪлЎң ліҙкё°" л”Ҙл§ҒнҒ¬ HTML мғқм„ұ
        function buildDeepLinkHTML(a, b) {
            if (!a || !b || a.lat == null || a.lng == null || b.lat == null || b.lng == null) return '';
            const url = `https://www.google.com/maps/dir/?api=1&origin=${a.lat},${a.lng}&destination=${b.lat},${b.lng}&travelmode=transit`;
            return `<div class="route-link-wrapper view-only"><a href="${url}" target="_blank" class="route-link-btn">рҹҡҮ кө¬кёҖ л§өмҠӨм—җм„ң лҢҖмӨ‘көҗнҶө кІҪлЎң ліҙкё°</a></div>`;
        }

        function renderList() {
            const container = document.getElementById('planner-list-container');
            const startContainer = document.getElementById('hotel-start-container');
            const endContainer = document.getElementById('hotel-end-container');
            const flightStartContainer = document.getElementById('flight-start-container');
            const flightEndContainer = document.getElementById('flight-end-container');
            container.innerHTML = '';
            startContainer.innerHTML = '';
            endContainer.innerHTML = '';
            flightStartContainer.innerHTML = '';
            flightEndContainer.innerHTML = '';

            if (!plannerData[currentDay]) plannerData[currentDay] = [];
            plannerData[currentDay] = plannerData[currentDay].filter(item => item && item.lat && item.lng);
            const currentList = plannerData[currentDay];

            // рҹ’Ў мҲҷмҶҢ мҲңм—° лЎңм§Ғ: 1мқјм°Ём—” м¶ңл°ң мҲҷмҶҢ м—ҶмқҢ, мқҙнӣ„м—” м „лӮ  мҲҷмҶҢк°Җ к·ёлӮ мқҳ м¶ңл°ңм җ
            const { startHotel, endHotel } = getDayHotels(currentDay);

            // рҹ’Ў н•ӯкіөнҺё: 1мқјм°Ё л§Ё мІҳмқҢм—” м¶ңл°ң н•ӯкіөнҺёмқҳ "лҸ„м°© кіөн•ӯ", л§Ҳм§Җл§үлӮ  л§Ё лҒқм—” к·Җкөӯ н•ӯкіөнҺёмқҳ "м¶ңл°ң кіөн•ӯ"мқ„ кІҪлЎңм—җ лҒјмӣҢ л„ЈлҠ”лӢӨ.
            const isFirstDay = currentDay === 1;
            const isLastDay = currentDay === totalTripDays;
            // рҹ’Ў мўҢн‘ң(lat/lng)к°Җ м—Ҷм–ҙлҸ„(мҲҳлҸҷ мһ…л Ҙм—җм„ң кіөн•ӯмқ„ мһҗлҸҷмҷ„м„ұмңјлЎң м„ нғқн•ҳм§Җ м•ҠмқҖ кІҪмҡ° л“ұ) н•ӯкіөнҺё м№ҙл“ң мһҗмІҙлҠ”
            //    н•ӯмғҒ н‘ңмӢңлҗҳм–ҙм•ј н•ҳлҜҖлЎң, "мўҢн‘ң мЎҙмһ¬ м—¬л¶Җ"к°Җ м•„лӢҲлқј "н•ӯкіөнҺё лҚ°мқҙн„° мЎҙмһ¬ м—¬л¶Җ"лЎңл§Ң нҢҗлӢЁн•ңлӢӨ.
            //    мўҢн‘ңк°Җ м—Ҷмңјл©ҙ sequence м•Ҳм—җм„ң buildDeepLinkHTMLмқҙ м•Ңм•„м„ң к·ё кө¬к°„мқҳ л”Ҙл§ҒнҒ¬л§Ң мғқлһөн•ңлӢӨ.
            const flightArrivalPoint = (isFirstDay && flightsData.outbound && flightsData.outbound.arr)
                ? { name: `${flightsData.outbound.flightNo} лҸ„м°© (${flightsData.outbound.arr.iata || ''})`, address: flightsData.outbound.arr.name || '', lat: flightsData.outbound.arr.lat, lng: flightsData.outbound.arr.lng }
                : null;
            const flightDeparturePoint = (isLastDay && flightsData.return && flightsData.return.dep)
                ? { name: `${flightsData.return.flightNo} м¶ңл°ң (${flightsData.return.dep.iata || ''})`, address: flightsData.return.dep.name || '', lat: flightsData.return.dep.lat, lng: flightsData.return.dep.lng }
                : null;

            // н•ҳлЈЁ м „мІҙ мқҙлҸҷ мҲңм„ң: [лҸ„м°© н•ӯкіөнҺё] вҶ’ [м¶ңл°ң мҲҷмҶҢ] вҶ’ мһҘмҶҢл“Ө вҶ’ [ліөк·Җ мҲҷмҶҢ] вҶ’ [к·Җкөӯ н•ӯкіөнҺё]
            const sequence = [];
            if (flightArrivalPoint) sequence.push(flightArrivalPoint);
            if (startHotel) sequence.push(startHotel);
            currentList.forEach(p => sequence.push(p));
            if (endHotel) sequence.push(endHotel);
            if (flightDeparturePoint) sequence.push(flightDeparturePoint);

            // рҹ’Ў мҲңм„ңмғҒ лӢӨмқҢ м§Җм җк№Ңм§Җмқҳ "кө¬кёҖ л§өмҠӨ кІҪлЎң ліҙкё°" л§ҒнҒ¬лҘј н•ҳлӮҳм”© мҶҢл№„н•ҳл©ҙм„ң к·ёл ӨмЈјлҠ” н—¬нҚј.
            //    н•ӯкіөнҺё/мҲҷмҶҢ кі м • м№ҙл“ңмҷҖ мһҘмҶҢ м№ҙл“ң лӘЁл‘җ к°ҷмқҖ л°©мӢқмңјлЎң мӮ¬мҡ©н•ҳлҜҖлЎң,
            //    л¬ҙм—Үмқҙ мһҲкі  м—ҶлҠ”м§ҖмҷҖ мғҒкҙҖм—Ҷмқҙ н•ӯмғҒ л‘җ м§Җм җ "мӮ¬мқҙ"м—җ л§ҒнҒ¬к°Җ мң„м№ҳн•ҳкІҢ лҗңлӢӨ.
            let seqPos = 0;
            function consumeNextLinkHTML() {
                const html = (seqPos + 1 < sequence.length) ? buildDeepLinkHTML(sequence[seqPos], sequence[seqPos + 1]) : '';
                seqPos++;
                return html;
            }

            // рҹ’Ў н•ҳлЈЁмқҳ л§Ё мІҳмқҢ (1мқјм°Ём—җл§Ң): лҸ„м°©н•ң л№„н–үкё°
            if (flightArrivalPoint) {
                const f = flightsData.outbound;
                const airlineTag = f.airline ? ` <span class="fi-addr" style="display:inline;">(${f.airline})</span>` : '';
                let html = `<div class="fixed-item flight-item"><div><span class="fi-label">вңҲпёҸ ${f.flightNo}</span>${f.dep.iata || f.dep.name || '?'} вҶ’ ${f.arr.iata || f.arr.name || '?'}${airlineTag}<span class="fi-addr">${f.dep.time || ''} м¶ңл°ң вҶ’ ${f.arr.time || ''} лҸ„м°© В· ${f.arr.name || ''}</span></div></div>`;
                html += consumeNextLinkHTML();
                flightStartContainer.innerHTML = html;
            }

            // рҹ’Ў н•ҳлЈЁмқҳ мӢңмһ‘: (2мқјм°Ёл¶Җн„°) м „лӮ  мҲҷмҶҢм—җм„ң м¶ңл°ң
            if (startHotel) {
                let html = `<div class="fixed-item"><div><span class="fi-label">рҹҸЁ м¶ңл°ң</span>${startHotel.name}<span class="fi-addr">${startHotel.address || ''}</span></div></div>`;
                html += consumeNextLinkHTML();
                startContainer.innerHTML = html;
            }

            if (currentList.length === 0 && !startHotel && !endHotel && !flightArrivalPoint && !flightDeparturePoint) return;

            currentList.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'place-item' + (item.mealType ? ' meal-item' : '');

                let timeParts = item.time.split(':');
                if (timeParts.length !== 2) timeParts = ['10', '00'];

                let memoText = item.memo || '';
                let memoHTML = `
                    <textarea class="memo-input edit-only" rows="2" placeholder="мқҙ мһҘмҶҢм—җ лҢҖн•ң л©”лӘЁлӮҳ нҢҒмқ„ м Ғм–ҙмЈјм„ёмҡ”!" onchange="updateMemo(${index}, this.value)">${memoText}</textarea>
                `;
                if (memoText.trim() !== '') {
                    memoHTML += `<div class="memo-text view-only">${memoText}</div>`;
                }

                const mealTagHTML = item.mealType ? `<span class="meal-tag">${MEAL_META[item.mealType].emoji} ${MEAL_META[item.mealType].label}</span>` : '';

                card.innerHTML = `
                    <div class="place-header">
                        <div class="header-left edit-only">
                            <div class="drag-handle" title="кёёкІҢ лҲҢлҹ¬м„ң мң„м•„лһҳлЎң мқҙлҸҷ">вҳ°</div>
                            <div class="order-btns">
                                <button type="button" class="order-btn" onclick="moveItem(${index}, -1)" title="мң„лЎң мқҙлҸҷ" ${index === 0 ? 'disabled' : ''}>в–І</button>
                                <button type="button" class="order-btn" onclick="moveItem(${index}, 1)" title="м•„лһҳлЎң мқҙлҸҷ" ${index === currentList.length - 1 ? 'disabled' : ''}>в–ј</button>
                            </div>
                            <div class="time-wrapper">
                                <select class="time-select" onchange="updateTime(${index}, this.value, 'hour')">${generateHourOptions(timeParts[0])}</select> :
                                <select class="time-select" onchange="updateTime(${index}, this.value, 'minute')">${generateMinuteOptions(timeParts[1])}</select>
                            </div>
                        </div>
                        <div class="time-text view-only">${item.time}</div>

                        <div class="action-group edit-only">
                            <button class="delete-btn" onclick="deletePlace(${index})">мӮӯм ң</button>
                        </div>
                    </div>

                    <div class="place-content">
                        <span class="place-name">${mealTagHTML}${index + 1}. ${item.name}</span>
                        <span class="place-address">${item.address}</span>
                        ${memoHTML}
                    </div>
                `;

                container.appendChild(card);

                // рҹ’Ў л”Ҙл§ҒнҒ¬лҠ” м№ҙл“ң "лӮҙл¶Җ"к°Җ м•„лӢҲлқј #planner-list-containerмқҳ нҳ•м ң мҡ”мҶҢлЎң м№ҙл“ң л°”лЎң л’Өм—җ л¶ҷмқёлӢӨ.
                //    м№ҙл“ң м•Ҳм—җ л„Јмңјл©ҙ "мқҙ мһҘмҶҢм—җм„ң лӮҳк°Ҳ л•Ң ліҙлҠ” кІҪлЎң"мқём§Җ "м—¬кё° мҳӨлҠ” кІҪлЎң"мқём§Җ н—·к°ҲлҰ¬лҜҖлЎң,
                //    л‘җ м№ҙл“ң "мӮ¬мқҙ"м—җ лҸ…лҰҪлҗң мҡ”мҶҢлЎң л‘җм–ҙ н•ӯмғҒ л‘җ м§Җм җмқ„ мһҮлҠ” кө¬к°„мһ„мқҙ лӘ…нҷ•н•ҳкІҢ ліҙмқҙкІҢ н•ңлӢӨ.
                //    (кІҪлЎң л§ҒнҒ¬лҠ” draggable: '.place-item' лҢҖмғҒ л°–мқҙлқј SortableJS мқёлҚұмҠӨ кі„мӮ°м—җлҠ” мҳҒн–Ҙмқҙ м—ҶлӢӨ)
                container.insertAdjacentHTML('beforeend', consumeNextLinkHTML());
            });

            // рҹ’Ў н•ҳлЈЁмқҳ л§Ҳм§Җл§ү: к·ёлӮ  л°Ө л¬өмқ„ мҲҷмҶҢлЎң ліөк·Җ
            if (endHotel) {
                let html = `<div class="fixed-item"><div><span class="fi-label">рҹҸЁ ліөк·Җ</span>${endHotel.name}<span class="fi-addr">${endHotel.address || ''}</span></div></div>`;
                html += consumeNextLinkHTML();
                endContainer.innerHTML = html;
            }

            // рҹ’Ў н•ҳлЈЁмқҳ л§Ё лҒқ (л§Ҳм§Җл§үлӮ м—җл§Ң): к·Җкөӯ н•ӯкіөнҺё м¶ңл°ң
            if (flightDeparturePoint) {
                const f = flightsData.return;
                const airlineTag = f.airline ? ` <span class="fi-addr" style="display:inline;">(${f.airline})</span>` : '';
                flightEndContainer.innerHTML = `<div class="fixed-item flight-item"><div><span class="fi-label">вңҲпёҸ ${f.flightNo}</span>${f.dep.iata || f.dep.name || '?'} вҶ’ ${f.arr.iata || f.arr.name || '?'}${airlineTag}<span class="fi-addr">${f.dep.time || ''} м¶ңл°ң вҶ’ ${f.arr.time || ''} лҸ„м°© В· ${f.dep.name || ''}</span></div></div>`;
            }
        }

        // рҹ’Ў л“ңлһҳк·ёк°Җ м–ҙл Өмҡҙ нҷҳкІҪ(нҠёлһҷнҢЁл“ң/мқјл¶Җ лӘЁл°”мқј лёҢлқјмҡ°м Җ л“ұ)мқ„ мң„н•ң лҢҖмІҙ мҲҳлӢЁ: в–Ів–ј лІ„нҠјмңјлЎң мҲңм„ң ліҖкІҪ
        function moveItem(index, direction) {
            const list = plannerData[currentDay];
            const newIndex = index + direction;
            if (!list || newIndex < 0 || newIndex >= list.length) return;
            const temp = list[index];
            list[index] = list[newIndex];
            list[newIndex] = temp;
            saveData();
            renderList();
            updateMarkers();
        }

        function addPlace() {
            try {
                if (!autocomplete) return;
                const place = autocomplete.getPlace();

                if (!place || !place.geometry) {
                    alert('кІҖмғү лӘ©лЎқм—җм„ң мһҘмҶҢлҘј м •нҷ•нһҲ нҒҙлҰӯн•ҙ м„ нғқн•ҙ мЈјм„ёмҡ”.'); return;
                }

                if (!plannerData[currentDay]) plannerData[currentDay] = [];

                // кё°мЎҙ л¶Ҳлҹү лҚ°мқҙн„° л°©м§Җмҡ© н•„н„°
                const validList = plannerData[currentDay].filter(i => i);
                let defaultTime = '10:00';
                if (validList.length > 0) {
                    defaultTime = validList[validList.length - 1].time || '10:00';
                }

                plannerData[currentDay].push({
                    name: place.name,
                    address: place.formatted_address,
                    lat: place.geometry.location.lat(),
                    lng: place.geometry.location.lng(),
                    time: defaultTime,
                    memo: ''
                });

                saveData();
                renderList(); updateMarkers(); // рҹ’Ў л°©кёҲ м¶”к°Җн•ң мһҘмҶҢлЎң нҷ•лҢҖн•ҳм§Җ м•Ҡкі , лӘЁл“  н•Җмқҙ н•ңлҲҲм—җ ліҙмқҙлҸ„лЎқ мһҗлҸҷ мЎ°м •

                document.getElementById('search-input').value = '';
                document.getElementById('search-input').blur();
            } catch (error) {
                alert('мһҘмҶҢ м¶”к°Җ мӨ‘ мҳӨлҘҳ: ' + error.message);
            }
        }

        function deletePlace(index) {
            const item = plannerData[currentDay][index];
            // мӢқмӮ¬ н•ӯлӘ©мқ„ лҰ¬мҠӨнҠём—җм„ң м§Ғм ‘ мӮӯм ңн•ҳл©ҙ мӢқмӮ¬ м„№м…ҳм—җм„ңлҸ„ н•ҙм ң
            if (item && item.mealType) {
                if (!mealsData[currentDay]) mealsData[currentDay] = {};
                mealsData[currentDay][item.mealType] = { skip: false };
            }
            plannerData[currentDay].splice(index, 1);
            saveData();
            renderList(); updateMarkers(); refreshExtraButtonStates();
        }

        /* ============ мқҙлҸҷмқј(н•ҳлЈЁ м•Ҳм—җм„ң лҸ„мӢңк°Җ л°”лҖҢлҠ” лӮ ) мһҗлҸҷ кө¬м—ӯ(zone) л¶„лҰ¬ ============
           рҹ’Ў лҸ„мӢң мқҙлҰ„мқ„ л”°лЎң мһ…л Ҙл°ӣм§Җ м•Ҡкі , мһҘмҶҢл“Өмқҳ мўҢн‘ң мӮ¬мқҙ мӢӨм ң кұ°лҰ¬(н•ҳлІ„мӮ¬мқё кіөмӢқ)л§ҢмңјлЎң
              "к°ҷмқҖ кө¬м—ӯ"мқём§Җ "лӢӨлҘё лҸ„мӢңлЎң л„ҳм–ҙк°„ кө¬м—ӯ"мқём§Җ мһҗлҸҷмңјлЎң нҢҗлӢЁн•ңлӢӨ.
              к°ҷмқҖ лҸ„мӢң м•Ҳм—җм„ңмқҳ мқҙлҸҷмқҖ ліҙнҶө 20kmлҘј л„ҳм§Җ м•Ҡм§Җл§Ң, лҸ„мӢң к°„ мқҙлҸҷ(мҳҲ: мҳӨмӮ¬м№ҙвҶ”көҗнҶ , м•Ҫ 40km)мқҖ
              мқҙ к°’мқ„ нӣҢм©Қ л„ҳкё° л•Ңл¬ём—җ к·ё м§Җм җм—җм„ң кө¬м—ӯмқ„ мғҲлЎң лӮҳлҲҲлӢӨ. */
        const ZONE_DISTANCE_THRESHOLD_KM = 20;

        function haversineKm(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // к·ё лӮ мқҳ мһҘмҶҢ лҰ¬мҠӨнҠё(plannerData[day])лҘј мҲңм„ңлҢҖлЎң нӣ‘мңјл©ҙм„ң, м•һ мһҘмҶҢмҷҖмқҳ кұ°лҰ¬к°Җ
        // мһ„кі„к°’мқ„ л„ҳлҠ” м§Җм җл§ҲлӢӨ мғҲ кө¬м—ӯмқ„ л§Ңл“ лӢӨ. л°ҳнҷҳк°’: [{ indices: [мӣҗліё л°°м—ҙ мқёлҚұмҠӨ, ...] }, ...]
        function computeDayZones(day) {
            const list = plannerData[day] || [];
            const zones = [];
            list.forEach((item, idx) => {
                if (!item || item.lat == null || item.lng == null) return;
                if (zones.length === 0) { zones.push({ indices: [idx] }); return; }
                const lastZone = zones[zones.length - 1];
                const lastItem = list[lastZone.indices[lastZone.indices.length - 1]];
                const dist = haversineKm(lastItem.lat, lastItem.lng, item.lat, item.lng);
                if (dist > ZONE_DISTANCE_THRESHOLD_KM) zones.push({ indices: [idx] });
                else lastZone.indices.push(idx);
            });
            return zones;
        }

        function zoneCentroid(zone, list) {
            const pts = zone.indices.map(i => list[i]);
            return {
                lat: pts.reduce((s, p) => s + p.lat, 0) / pts.length,
                lng: pts.reduce((s, p) => s + p.lng, 0) / pts.length
            };
        }

        // мҲҷмҶҢмІҳлҹј лі„лҸ„лЎң кҙҖлҰ¬лҗҳлҠ” м§Җм җмқҙ м—¬лҹ¬ кө¬м—ӯ мӨ‘ м–ҙл””м—җ к°ҖмһҘ к°Җк№Ңмҡҙм§Җ нҢҗлӢЁ
        function nearestZoneIndexForPoint(zones, list, point) {
            let best = 0, bestDist = Infinity;
            zones.forEach((zone, idx) => {
                const c = zoneCentroid(zone, list);
                const d = haversineKm(c.lat, c.lng, point.lat, point.lng);
                if (d < bestDist) { bestDist = d; best = idx; }
            });
            return best;
        }

        function updateMarkers() {
            markers.forEach(m => m.setMap(null)); markers = [];
            if (!plannerData[currentDay]) return;

            const list = plannerData[currentDay];
            const dayZones = computeDayZones(currentDay);

            // рҹ’Ў кө¬м—ӯмқҙ 2к°ң мқҙмғҒмқҙл©ҙ(=н•ҳлЈЁ м•Ҳм—җм„ң лӢӨлҘё лҸ„мӢңлЎң мқҙлҸҷн•ң лӮ ) лҸ„мӢң мқҙлҰ„мқҙлӮҳ нғӯ м„ нғқ м—Ҷмқҙ
            //    мһҗлҸҷмңјлЎң "к°ҖмһҘ л§Ҳм§Җл§ү(мөңмӢ ) кө¬м—ӯ"л§Ң м§ҖлҸ„м—җ ліҙм—¬мӨҖлӢӨ. мҰү, мҳӨмӮ¬м№ҙм—җм„ң көҗнҶ лЎң мқҙлҸҷн–ҲлӢӨл©ҙ
            //    мқҙлҸҷ нӣ„ лҸ„м°©н•ң көҗнҶ  мӘҪ н•Җл“Өл§Ң м§ҖлҸ„м—җ н‘ңмӢңлҗҳкі , мҳӨмӮ¬м№ҙ н•Җ л•Ңл¬ём—җ м§ҖлҸ„к°Җ м¶•мҶҢлҗҳм§Җ м•ҠлҠ”лӢӨ.
            //    кө¬м—ӯмқҙ 1к°ңлҝҗмқё лӮ (лҸ„мӢң мқҙлҸҷмқҙ м—ҶлҠ” лӮ )мқҖ кё°мЎҙмІҳлҹј к·ё лӮ  н•Җ м „мІҙлҘј лӢӨ ліҙм—¬мӨҖлӢӨ.
            const multiZone = dayZones.length > 1;
            activeZoneIndex = multiZone ? dayZones.length - 1 : 0;
            const activeIndices = multiZone ? new Set(dayZones[activeZoneIndex].indices) : null;

            const bounds = new google.maps.LatLngBounds();
            let hasBoundsPoint = false;

            // рҹ’Ў к·ёлӮ мқҳ м¶ңл°ң/ліөк·Җ мҲҷмҶҢ (мҲңм—° лЎңм§Ғ м Ғмҡ©) - к°ҷмқҖ мң„м№ҳл©ҙ л§Ҳм»Ө мӨ‘ліө л°©м§Җ
            const { startHotel, endHotel } = getDayHotels(currentDay);

            // рҹ’Ў н•ӯкіөнҺё(кіөн•ӯ) мўҢн‘ңлҠ” мӢӨм ң мһ„лІ л“ң м§ҖлҸ„мқҳ л§Ҳм»Ө/нҷ”л©ҙлІ”мң„(fitBounds)м—җлҠ” л„Јм§Җ м•ҠлҠ”лӢӨ.
            //    кіөн•ӯмқҖ м—¬н–үм§Җм—җм„ң мҲҳл°ұ~мҲҳмІң km л–Ём–ҙм§„ кІҪмҡ°к°Җ лҢҖл¶Җл¶„мқҙлқј, м—¬кё° л„Јмңјл©ҙ
            //    м§ҖлҸ„к°Җ лҸ„мӢң лӢЁмң„к°Җ м•„лӢҲлқј көӯк°Җ/лҢҖлҘҷ лӢЁмң„лЎң мӨҢм•„мӣғлҸјлІ„л Ө мӮ¬мӢӨмғҒ м§ҖлҸ„к°Җ лӘ» м“°кІҢ лҗңлӢӨ.
            //    н•ӯкіөнҺё м •ліҙлҠ” мӮ¬мқҙл“ңл°” м№ҙл“ң + "кө¬кёҖл§өмҠӨм—җм„ң м—ҙкё°" мҷёл¶Җ л”Ҙл§ҒнҒ¬лЎңл§Ң ліҙм—¬мӨҖлӢӨ.

            const placedHotelKeys = new Set();
            [startHotel, endHotel].forEach(h => {
                if (!h || h.lat == null || h.lng == null) return;
                // мқҙлҸҷмқјм—җлҠ” мҲҷмҶҢлҸ„ нҳ„мһ¬ н‘ңмӢң мӨ‘мқё кө¬м—ӯм—җ мҶҚн•  л•Ңл§Ң м§ҖлҸ„м—җ н•Ёк»ҳ ліҙм—¬мӨҖлӢӨ.
                if (multiZone && nearestZoneIndexForPoint(dayZones, list, h) !== activeZoneIndex) return;
                const key = h.lat + ',' + h.lng;
                if (placedHotelKeys.has(key)) return;
                placedHotelKeys.add(key);
                const pos = { lat: h.lat, lng: h.lng };
                const hotelMarker = new google.maps.Marker({
                    map: map, position: pos, title: h.name,
                    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 9, fillColor: '#00cec9', fillOpacity: 1, strokeColor: '#ffffff', strokeWeight: 2 }
                });
                markers.push(hotelMarker);
                bounds.extend(pos); hasBoundsPoint = true;
            });

            let shownItemCount = 0;
            list.forEach((item, index) => {
                if (!item || !item.lat || !item.lng) return;
                if (multiZone && !activeIndices.has(index)) return;
                shownItemCount++;
                const pos = { lat: item.lat, lng: item.lng };
                const marker = new google.maps.Marker({ map: map, position: pos, label: String(index + 1), title: item.name });
                markers.push(marker);
                bounds.extend(pos); hasBoundsPoint = true;
            });

            const totalPoints = shownItemCount + placedHotelKeys.size;
            if (hasBoundsPoint && totalPoints > 1) {
                map.fitBounds(bounds);
            } else if (hasBoundsPoint) {
                map.setCenter(bounds.getCenter());
                map.setZoom(15);
            }

            handleRouteDisplay();
        }

        /* ============ л·° лӘЁл“ң: мһҘмҶҢл“Өмқ„ мҲңм„ңлҢҖлЎң лҢҖмӨ‘көҗнҶө кІҪлЎңм„ мңјлЎң м—°кІ° ============ */

        function clearRoutes() {
            directionsRenderers.forEach(r => r.setMap(null));
            directionsRenderers = [];
            fallbackPolylines.forEach(p => p.setMap(null));
            fallbackPolylines = [];
        }

        function handleRouteDisplay() {
            clearRoutes();
            if (currentMode === 'view') drawRoutesForViewMode();
        }

        function drawRoutesForViewMode() {
            if (!plannerData[currentDay]) return;

            // рҹ’Ў мҲҷмҶҢ(м¶ңл°ң) вҶ’ мһҘмҶҢл“Ө вҶ’ мҲҷмҶҢ(ліөк·Җ) кө¬к°„л§Ң лҢҖмӨ‘көҗнҶө кІҪлЎңлЎң кі„мӮ°н•ңлӢӨ.
            //    н•ӯкіөнҺё(кіөн•ӯ) мўҢн‘ңлҠ” л„Јм§Җ м•ҠлҠ”лӢӨ - лҸ„мӢңмҷҖ кіөн•ӯ мӮ¬мқҙлҠ” лҢҖмӨ‘көҗнҶө кІҪлЎң мһҗмІҙк°Җ
            //    м•Ҳ лӮҳмҳӨлҠ” кІҪмҡ°к°Җ л§Һкі (көӯм ңм„  л“ұ), кі„мӮ°м—җ л„Јмңјл©ҙ м§ҖлҸ„ нҷ”л©ҙлІ”мң„(fitBounds)к№Ңм§Җ
            //    к°ҷмқҙ мҷңкіЎлҗҳм–ҙ м§ҖлҸ„к°Җ мӮ¬мӢӨмғҒ лӘ» м“°кІҢ лҗңлӢӨ. кіөн•ӯ кө¬к°„мқҖ мӮ¬мқҙл“ңл°”мқҳ л”Ҙл§ҒнҒ¬лЎң м•ҲлӮҙн•ңлӢӨ.
            const dayItems = plannerData[currentDay];
            const dayZones = computeDayZones(currentDay);
            const multiZone = dayZones.length > 1;
            const activeIndices = multiZone ? new Set(dayZones[Math.min(activeZoneIndex, dayZones.length - 1)].indices) : null;

            const { startHotel, endHotel } = getDayHotels(currentDay);
            const list = [];
            // рҹ’Ў мқҙлҸҷмқјм—җлҠ” нҳ„мһ¬ м„ нғқлҗң кө¬м—ӯкіј лӢӨлҘё лҸ„мӢңлЎң л„ҳм–ҙк°ҖлҠ” кө¬к°„к№Ңм§Җ м„ мқ„ к·ёлҰ¬л©ҙ
            //    м§ҖлҸ„ л°– лЁј м§Җм җк№Ңм§Җ кІҪлЎңк°Җ мқҙм–ҙм ё нҷ”л©ҙлІ”мң„(fitBounds)к°Җ лӢӨмӢң к№Ём§„лӢӨ.
            //    л”°лқјм„ң кІҪлЎңлҸ„ м„ нғқлҗң кө¬м—ӯ м•Ҳмқҳ м§Җм җлҒјлҰ¬л§Ң м—°кІ°н•ңлӢӨ.
            if (startHotel && startHotel.lat != null && startHotel.lng != null &&
                (!multiZone || nearestZoneIndexForPoint(dayZones, dayItems, startHotel) === activeZoneIndex)) {
                list.push(startHotel);
            }
            dayItems.forEach((p, idx) => {
                if (!p || !p.lat || !p.lng) return;
                if (multiZone && !activeIndices.has(idx)) return;
                list.push(p);
            });
            if (endHotel && endHotel.lat != null && endHotel.lng != null &&
                (!multiZone || nearestZoneIndexForPoint(dayZones, dayItems, endHotel) === activeZoneIndex)) {
                list.push(endHotel);
            }

            if (list.length < 2) return;

            if (!directionsService) directionsService = new google.maps.DirectionsService();

            for (let i = 0; i < list.length - 1; i++) {
                const origin = { lat: list[i].lat, lng: list[i].lng };
                const destination = { lat: list[i + 1].lat, lng: list[i + 1].lng };

                const renderer = new google.maps.DirectionsRenderer({
                    map: map,
                    suppressMarkers: true,
                    preserveViewport: true,
                    polylineOptions: { strokeColor: '#0984e3', strokeWeight: 4, strokeOpacity: 0.85 }
                });
                directionsRenderers.push(renderer);

                directionsService.route(
                    { origin, destination, travelMode: google.maps.TravelMode.TRANSIT },
                    (result, status) => {
                        if (status === 'OK') {
                            renderer.setDirections(result);
                        } else {
                            // рҹ’Ў лҢҖмӨ‘көҗнҶө кІҪлЎңлҘј м°ҫм§Җ лӘ»н•ң кІҪмҡ°, м җм„ мңјлЎң м§Ғм„  м—°кІ° (кұ°лҰ¬к°Җ л„Ҳл¬ҙ к°Җк№қкұ°лӮҳ кІҪлЎң м •ліҙк°Җ м—ҶлҠ” кІҪмҡ° л“ұ)
                            renderer.setMap(null);
                            const line = new google.maps.Polyline({
                                path: [origin, destination],
                                strokeOpacity: 0,
                                icons: [{
                                    icon: { path: 'M 0,-1 0,1', strokeOpacity: 1, scale: 3 },
                                    offset: '0',
                                    repeat: '10px'
                                }],
                                strokeColor: '#0984e3',
                                map: map
                            });
                            fallbackPolylines.push(line);
                        }
                    }
                );
            }
        }

        /* ============ PDF лӮҙліҙлӮҙкё° ============
           рҹ’Ў мҳҲм „ л°©мӢқ(html2canvasлЎң нҷ”л©ҙмқ„ нҶөм§ёлЎң мҠӨнҒ¬лҰ°мғ· м°Қм–ҙ мқҙлҜём§ҖлЎң мӮҪмһ…)мқҖ мқјм •мқҙ мЎ°кёҲл§Ң кёём–ҙлҸ„
              мқҙлҜём§Җк°Җ нҺҳмқҙм§Җ лҶ’мқҙлҘј л„ҳм–ҙм„ң мһҳлҰ¬кұ°лӮҳ мқҙмғҒн•ҳкІҢ лҠҳм–ҙлӮҳ ліҙмқҙлҠ” л¬ём ңк°Җ мһҲм—ҲлӢӨ.
              к·ёлһҳм„ң м§ҖкёҲмқҖ jsPDFлЎң н…ҚмҠӨнҠёлҘј м§Ғм ‘ к·ёл Өм„ң, лӮҙмҡ©мқҙ нҺҳмқҙм§ҖлҘј л„ҳкё°л©ҙ мһҗлҸҷмңјлЎң лӢӨмқҢ мһҘмңјлЎң
              л„ҳм–ҙк°ҖлҠ”(page break) м§„м§ң н…ҚмҠӨнҠё кё°л°ҳ PDFлҘј л§Ңл“ лӢӨ. кёҖмһҗ мҲҳк°Җ мқҙлҜём§ҖліҙлӢӨ нӣЁм”¬ мһ‘кё° л•Ңл¬ём—җ
              ліҙнҶө н•ҳлЈЁ мқјм •мқҖ 1~2мһҘ м•Ҳм—җ к№”лҒ”н•ҳкІҢ л“Өм–ҙк°„лӢӨ.
              лӢЁ, jsPDFмқҳ кё°ліё нҸ°нҠёлҠ” н•ңкёҖмқ„ м§Җмӣҗн•ҳм§Җ м•ҠмңјлҜҖлЎң, н•ңкёҖмқҙ к№Ём§Җм§Җ м•ҠлҸ„лЎқ лӮҳлҲ”кі л”• нҸ°нҠёлҘј
              (мөңмҙҲ 1нҡҢ) CDNм—җм„ң лӮҙл Өл°ӣм•„ PDFм—җ лӮҙмһҘн•ңлӢӨ. */

        let cachedKoreanFontBase64 = null;

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const chunkSize = 0x8000;
            for (let i = 0; i < bytes.length; i += chunkSize) {
                binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
            }
            return btoa(binary);
        }

        async function ensureKoreanFont(pdf) {
            if (!cachedKoreanFontBase64) {
                const fontUrl = 'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/nanumgothic/NanumGothic-Regular.ttf';
                const res = await fetch(fontUrl);
                if (!res.ok) throw new Error('н•ңкёҖ нҸ°нҠёлҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.');
                const buffer = await res.arrayBuffer();
                cachedKoreanFontBase64 = arrayBufferToBase64(buffer);
            }
            pdf.addFileToVFS('NanumGothic-Regular.ttf', cachedKoreanFontBase64);
            pdf.addFont('NanumGothic-Regular.ttf', 'NanumGothic', 'normal');
            pdf.setFont('NanumGothic', 'normal');
        }

        async function exportToPDF() {
            syncMealItemsIntoList();
            const { startHotel, endHotel } = getDayHotels(currentDay);
            const isFirstDay = currentDay === 1;
            const isLastDay = currentDay === totalTripDays;
            const flightArrival = (isFirstDay && flightsData.outbound) ? flightsData.outbound : null;
            const flightDeparture = (isLastDay && flightsData.return) ? flightsData.return : null;
            const dayItems = plannerData[currentDay] || [];
            const dayExpenses = expensesData[currentDay] || [];

            if (dayItems.length === 0 && !startHotel && !endHotel && !flightArrival && !flightDeparture) {
                alert('м ҖмһҘн•  мқјм •мқҙ м—ҶмҠөлӢҲлӢӨ!'); return;
            }

            const btn = document.querySelector('.pdf-btn');
            const originalLabel = btn ? btn.innerText : '';
            if (btn) { btn.innerText = 'вҸі PDF л§Ңл“ңлҠ” мӨ‘...'; btn.disabled = true; }

            try {
                window.jsPDF = window.jspdf.jsPDF;
                const pdf = new jsPDF('p', 'mm', 'a4');
                await ensureKoreanFont(pdf);

                // ---- л Ҳмқҙм•„мӣғ мғҒмҲҳ ----
                const pageW = 210, pageH = 297;
                const marginL = 16, marginR = 16, marginT = 18, marginB = 16;
                const usableW = pageW - marginL - marginR;
                const COLOR_PRIMARY = [108, 92, 231];   // #6c5ce7
                const COLOR_ACCENT  = [9, 132, 227];    // #0984e3
                const COLOR_TEXT    = [45, 52, 54];     // #2d3436
                const COLOR_SUB     = [127, 143, 166];  // #7f8fa6
                const COLOR_LINE    = [223, 224, 228];

                let y = marginT;

                function newPage() {
                    pdf.addPage();
                    y = marginT;
                }
                function ensure(need) {
                    if (y + need > pageH - marginB) newPage();
                }
                // рҹ’Ў лі„лҸ„ bold нҸ°нҠё нҢҢмқј м—ҶмқҙлҸ„ мӮҙм§қ л‘җк»ҚкІҢ ліҙмқҙлҸ„лЎқ, к°ҷмқҖ кёҖмһҗлҘј м•„мЈј мӮҙм§қ кІ№міҗ л‘җ лІҲ к·ёлҰ°лӢӨ.
                function boldText(text, x, size, color) {
                    pdf.setFontSize(size);
                    pdf.setTextColor(color[0], color[1], color[2]);
                    pdf.text(text, x, y);
                    pdf.text(text, x + 0.15, y);
                }
                function normalText(text, x, size, color) {
                    pdf.setFontSize(size);
                    pdf.setTextColor(color[0], color[1], color[2]);
                    pdf.text(text, x, y);
                }
                function wrappedText(text, x, size, color, maxWidth) {
                    pdf.setFontSize(size);
                    pdf.setTextColor(color[0], color[1], color[2]);
                    const lines = pdf.splitTextToSize(text, maxWidth);
                    ensure(lines.length * (size * 0.42) + 1);
                    pdf.text(lines, x, y);
                    y += lines.length * (size * 0.42);
                    return lines.length;
                }
                function hr() {
                    ensure(4);
                    pdf.setDrawColor(COLOR_LINE[0], COLOR_LINE[1], COLOR_LINE[2]);
                    pdf.setLineWidth(0.2);
                    pdf.line(marginL, y, pageW - marginR, y);
                    y += 4;
                }

                // ---- м ңлӘ© ----
                const dateObj = tripDates[currentDay];
                const dateStr = dateObj ? dateObj.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' }) : '';
                boldText(`${tripCity || ''} м—¬н–ү мқјм •н‘ң`, pageW / 2 - pdf.getTextWidth(`${tripCity || ''} м—¬н–ү мқјм •н‘ң`) / 2, 17, COLOR_PRIMARY);
                y += 7;
                normalText(`${currentDay}мқјм°Ё / мҙқ ${totalTripDays}мқј   В·   ${dateStr}`, pageW / 2 - pdf.getTextWidth(`${currentDay}мқјм°Ё / мҙқ ${totalTripDays}мқј   В·   ${dateStr}`) / 2, 10.5, COLOR_SUB);
                y += 6;
                pdf.setDrawColor(COLOR_PRIMARY[0], COLOR_PRIMARY[1], COLOR_PRIMARY[2]);
                pdf.setLineWidth(0.7);
                pdf.line(marginL, y, pageW - marginR, y);
                y += 8;

                // ---- н•ӯкіөнҺё(лҸ„м°©) ----
                if (flightArrival) {
                    const f = flightArrival;
                    ensure(16);
                    boldText(`вңҲпёҸ лҸ„м°© н•ӯкіөнҺё В· ${f.flightNo}${f.airline ? ' (' + f.airline + ')' : ''}`, marginL, 11.5, COLOR_PRIMARY);
                    y += 5.5;
                    normalText(`${f.dep.iata || f.dep.name || '?'} вҶ’ ${f.arr.iata || f.arr.name || '?'}   |   ${f.dep.time || '--:--'} м¶ңл°ң вҶ’ ${f.arr.time || '--:--'} лҸ„м°©`, marginL, 10, COLOR_TEXT);
                    y += 5;
                    if (f.arr.name) { wrappedText(`лҸ„м°©м§Җ: ${f.arr.name}`, marginL, 8.5, COLOR_SUB, usableW); y += 1; }
                    y += 2;
                    hr();
                }

                // ---- м¶ңл°ң мҲҷмҶҢ ----
                if (startHotel) {
                    ensure(14);
                    boldText(`рҹҸЁ м¶ңл°ң мҲҷмҶҢ`, marginL, 11, COLOR_ACCENT);
                    y += 5.5;
                    wrappedText(startHotel.name || '', marginL, 10, COLOR_TEXT, usableW);
                    if (startHotel.address) wrappedText(startHotel.address, marginL, 8.5, COLOR_SUB, usableW);
                    y += 3;
                    hr();
                }

                // ---- н•ҳлЈЁ мқјм •(мһҘмҶҢ/мӢқмӮ¬) ----
                dayItems.forEach((item, idx) => {
                    const mealMeta = item.mealType ? MEAL_META[item.mealType] : null;
                    const labelPrefix = mealMeta ? `${mealMeta.emoji} [${mealMeta.label}] ` : '';
                    const memoText = (item.memo || '').trim();

                    ensure(12);
                    boldText(`${idx + 1}. ${item.time || ''}  ${labelPrefix}${item.name || ''}`, marginL, 10.5, COLOR_TEXT);
                    y += 5;
                    if (item.address) wrappedText(item.address, marginL + 4, 8.5, COLOR_SUB, usableW - 4);
                    if (memoText) { y += 0.5; wrappedText(`рҹ“қ ${memoText}`, marginL + 4, 8.5, COLOR_ACCENT, usableW - 4); }
                    y += 4;
                });
                if (dayItems.length > 0) hr();

                // ---- ліөк·Җ мҲҷмҶҢ ----
                if (endHotel) {
                    ensure(14);
                    boldText(`рҹҸЁ ліөк·Җ мҲҷмҶҢ`, marginL, 11, COLOR_ACCENT);
                    y += 5.5;
                    wrappedText(endHotel.name || '', marginL, 10, COLOR_TEXT, usableW);
                    if (endHotel.address) wrappedText(endHotel.address, marginL, 8.5, COLOR_SUB, usableW);
                    y += 3;
                    hr();
                }

                // ---- н•ӯкіөнҺё(м¶ңл°ң) ----
                if (flightDeparture) {
                    const f = flightDeparture;
                    ensure(16);
                    boldText(`вңҲпёҸ к·Җкөӯ н•ӯкіөнҺё В· ${f.flightNo}${f.airline ? ' (' + f.airline + ')' : ''}`, marginL, 11.5, COLOR_PRIMARY);
                    y += 5.5;
                    normalText(`${f.dep.iata || f.dep.name || '?'} вҶ’ ${f.arr.iata || f.arr.name || '?'}   |   ${f.dep.time || '--:--'} м¶ңл°ң вҶ’ ${f.arr.time || '--:--'} лҸ„м°©`, marginL, 10, COLOR_TEXT);
                    y += 5;
                    if (f.dep.name) { wrappedText(`м¶ңл°ңм§Җ: ${f.dep.name}`, marginL, 8.5, COLOR_SUB, usableW); y += 1; }
                    y += 2;
                    hr();
                }

                // ---- мқҙ лӮ мқҳ кІҪл№„ ----
                if (dayExpenses.length > 0) {
                    const dayTotal = dayExpenses.reduce((sum, e) => sum + (Number(e.amount) || 0), 0);
                    ensure(10 + dayExpenses.length * 5);
                    boldText(`рҹ’° мқҙ лӮ мқҳ кІҪл№„`, marginL, 11, COLOR_ACCENT);
                    y += 5.5;
                    dayExpenses.forEach(e => {
                        ensure(5);
                        normalText(e.desc || '', marginL, 9, COLOR_TEXT);
                        const amountText = `${Number(e.amount).toLocaleString()}мӣҗ`;
                        normalText(amountText, pageW - marginR - pdf.getTextWidth(amountText), 9, COLOR_TEXT);
                        y += 4.5;
                    });
                    ensure(6);
                    boldText(`н•©кі„`, marginL, 9.5, COLOR_TEXT);
                    const totalText = `${dayTotal.toLocaleString()}мӣҗ`;
                    boldText(totalText, pageW - marginR - pdf.getTextWidth(totalText), 9.5, COLOR_PRIMARY);
                    y += 5;
                }

                // ---- нҺҳмқҙм§Җ лІҲнҳё ----
                const pageCount = pdf.getNumberOfPages();
                for (let p = 1; p <= pageCount; p++) {
                    pdf.setPage(p);
                    pdf.setFontSize(8.5);
                    pdf.setTextColor(COLOR_SUB[0], COLOR_SUB[1], COLOR_SUB[2]);
                    pdf.text(`${p} / ${pageCount}`, pageW / 2, pageH - 9, { align: 'center' });
                }

                pdf.save(`м—¬н–үмқјм •н‘ң_${currentDay}мқјм°Ё.pdf`);
            } catch (error) {
                alert('PDF мғқм„ұ мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ. (л„ӨнҠёмӣҢнҒ¬ мғҒнғңлҘј нҷ•мқён•ҳкі  лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”)');
            } finally {
                if (btn) { btn.innerText = originalLabel; btn.disabled = false; }
            }
        }
    </script>

</body>
</html>
