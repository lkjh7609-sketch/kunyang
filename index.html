                    <input type="text" class="expense-desc" id="expense-desc-input" placeholder="사용처 (예: 점심 식사)">
                    <input type="number" class="expense-amount" id="expense-amount-input" placeholder="금액">
                    <button type="button" class="expense-add-btn" onclick="addExpense()">추가</button>
                </div>
                <div class="expense-list">
                    ${list.map((e, i) => `
                        <div class="expense-list-item">
                            <span class="exp-desc">${e.desc}</span>
                            <span class="exp-amount">${Number(e.amount).toLocaleString()}원</span>
                            <button type="button" class="expense-del" onclick="deleteExpense(${i})">삭제</button>
                        </div>
                    `).join('') || '<p style="font-size:12px;color:#b2bec3;">아직 등록된 경비가 없습니다.</p>'}
                </div>
                <div class="expense-day-total"><span>이 날 합계</span><span>${dayTotal.toLocaleString()}원</span></div>
                <div class="expense-grand-total"><span>전체 여행 합계</span><span>${grandTotal.toLocaleString()}원</span></div>
            `;
        }

        function addExpense() {
            const desc = document.getElementById('expense-desc-input').value.trim();
            const amount = Number(document.getElementById('expense-amount-input').value);
            if (!desc || !amount) { alert('사용처와 금액을 모두 입력해주세요.'); return; }

            if (!expensesData[currentDay]) expensesData[currentDay] = [];
            expensesData[currentDay].push({ desc, amount });
            saveData();
            renderExpenseSection();
            refreshExtraButtonStates();
        }

        function deleteExpense(index) {
            expensesData[currentDay].splice(index, 1);
            saveData();
            renderExpenseSection();
            refreshExtraButtonStates();
        }

        /* ============ 일정(날짜) 관리 ============ */

        function generateHourOptions(selectedHour) {
            let html = '';
            for (let h = 0; h < 24; h++) {
                const hh = String(h).padStart(2, '0');
                html += `<option value="${hh}" ${hh === selectedHour ? 'selected' : ''}>${hh}시</option>`;
            }
            return html;
        }

        function generateMinuteOptions(selectedMinute) {
            let html = '';
            for (let m = 0; m < 60; m += 5) {
                const mm = String(m).padStart(2, '0');
                html += `<option value="${mm}" ${mm === selectedMinute ? 'selected' : ''}>${mm}분</option>`;
            }
            return html;
        }

        function generateSchedule(isLoad = false) {
            if (!tripStart || !tripEnd) return;
            const startDate = new Date(tripStart);
            const endDate = new Date(tripEnd);
            if (startDate > endDate) { alert('종료일이 출발일보다 빠를 수 없습니다.'); return; }

            const diffTime = Math.abs(endDate - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            totalTripDays = diffDays;

            if (!isLoad) plannerData = {};
            tripDates = {};
            const container = document.getElementById('day-tabs-container');
            container.innerHTML = '';

            for (let i = 1; i <= diffDays; i++) {
                let activeDate = new Date(startDate);
                activeDate.setDate(startDate.getDate() + (i - 1));
                let dateString = `${activeDate.getMonth() + 1}/${activeDate.getDate()}`;
                tripDates[i] = activeDate;

                if (!isLoad) plannerData[i] = [];
                if (isLoad && !plannerData[i]) plannerData[i] = [];

                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `day-tab ${i === currentDay ? 'active' : ''}`;
                btn.id = `tab-day-${i}`;
                btn.innerText = `${i}일차 (${dateString})`;
                btn.onclick = () => changeDay(i);
                container.appendChild(btn);
            }

            if (currentDay > diffDays) currentDay = diffDays;

            renderTripInfoBar();
            saveData();
            if (!isLoad) changeDay(1);
            else changeDay(currentDay);
        }

        function changeDay(day) {
            currentDay = day;
            document.querySelectorAll('.day-tab').forEach(tab => tab.classList.remove('active'));
            const selectedTab = document.getElementById(`tab-day-${day}`);
            if (selectedTab) selectedTab.classList.add('active');

            closeAllSections();
            saveData();
            renderList(); updateMarkers(); refreshExtraButtonStates();
        }

        function updateTime(index, val, type) {
            let parts = plannerData[currentDay][index].time.split(':');
            if (type === 'hour') parts[0] = val;
            else parts[1] = val;
            plannerData[currentDay][index].time = parts.join(':');
            saveData();
        }

        function updateMemo(index, val) {
            plannerData[currentDay][index].memo = val;
            saveData();
        }

        /* ============ 드래그 정렬 ============ */

        function initSortable() {
            const el = document.getElementById('planner-list-container');
            if (sortableInstance) sortableInstance.destroy();

            sortableInstance = new Sortable(el, {
                handle: '.drag-handle',
                draggable: '.place-item',   // 💡 place-item만 드래그 대상으로 인식 (경로 링크/고정 숙소 항목 제외)
                animation: 150,
                ghostClass: 'sortable-ghost',
                forceFallback: true,        // 💡 네이티브 HTML5 드래그 대신 자체 구현 사용 (모바일/터치에서 훨씬 안정적)
                fallbackTolerance: 3,
                delay: 100,
                delayOnTouchOnly: true,
                touchStartThreshold: 5,
                onEnd: function (evt) {
                    const fromIndex = evt.oldIndex;
                    const toIndex = evt.newIndex;
                    if (fromIndex === undefined || toIndex === undefined || fromIndex === toIndex) {
                        renderList();
                        return;
                    }
                    // 💡 #planner-list-container의 직속 자식은 이제 .place-item뿐이므로
                    //    evt.oldIndex / evt.newIndex가 plannerData 배열 인덱스와 정확히 일치한다.
                    //    끌어온 항목을 놓은 위치로 "이동"시키고 나머지는 자연스럽게 한 칸씩 밀린다.
                    const list = plannerData[currentDay];
                    const moved = list.splice(fromIndex, 1)[0];
                    list.splice(toIndex, 0, moved);
                    saveData();
                    renderList();
                    updateMarkers();
                }
            });
        }

        /* ============ 리스트 렌더링 ============ */

        // 💡 두 지점 사이의 "구글 맵스 대중교통 경로 보기" 딥링크 HTML 생성
        function buildDeepLinkHTML(a, b) {
            if (!a || !b || a.lat == null || a.lng == null || b.lat == null || b.lng == null) return '';
            const url = `https://www.google.com/maps/dir/?api=1&origin=${a.lat},${a.lng}&destination=${b.lat},${b.lng}&travelmode=transit`;
            return `<div class="route-link-wrapper view-only"><a href="${url}" target="_blank" class="route-link-btn">🚇 구글 맵스에서 대중교통 경로 보기</a></div>`;
        }

        function renderList() {
            const container = document.getElementById('planner-list-container');
            const startContainer = document.getElementById('hotel-start-container');
            const endContainer = document.getElementById('hotel-end-container');
            const flightStartContainer = document.getElementById('flight-start-container');
            const flightEndContainer = document.getElementById('flight-end-container');
            container.innerHTML = '';
            startContainer.innerHTML = '';
            endContainer.innerHTML = '';
            flightStartContainer.innerHTML = '';
            flightEndContainer.innerHTML = '';

            if (!plannerData[currentDay]) plannerData[currentDay] = [];
            plannerData[currentDay] = plannerData[currentDay].filter(item => item && item.lat && item.lng);
            const currentList = plannerData[currentDay];

            // 💡 숙소 순연 로직: 1일차엔 출발 숙소 없음, 이후엔 전날 숙소가 그날의 출발점
            const { startHotel, endHotel } = getDayHotels(currentDay);

            // 💡 항공편: 1일차 맨 처음엔 출발 항공편의 "도착 공항", 마지막날 맨 끝엔 귀국 항공편의 "출발 공항"을 경로에 끼워 넣는다.
            const isFirstDay = currentDay === 1;
            const isLastDay = currentDay === totalTripDays;
            // 💡 좌표(lat/lng)가 없어도(수동 입력에서 공항을 자동완성으로 선택하지 않은 경우 등) 항공편 카드 자체는
            //    항상 표시되어야 하므로, "좌표 존재 여부"가 아니라 "항공편 데이터 존재 여부"로만 판단한다.
            //    좌표가 없으면 sequence 안에서 buildDeepLinkHTML이 알아서 그 구간의 딥링크만 생략한다.
            const flightArrivalPoint = (isFirstDay && flightsData.outbound && flightsData.outbound.arr)
                ? { name: `${flightsData.outbound.flightNo} 도착 (${flightsData.outbound.arr.iata || ''})`, address: flightsData.outbound.arr.name || '', lat: flightsData.outbound.arr.lat, lng: flightsData.outbound.arr.lng }
                : null;
            const flightDeparturePoint = (isLastDay && flightsData.return && flightsData.return.dep)
                ? { name: `${flightsData.return.flightNo} 출발 (${flightsData.return.dep.iata || ''})`, address: flightsData.return.dep.name || '', lat: flightsData.return.dep.lat, lng: flightsData.return.dep.lng }
                : null;

            // 하루 전체 이동 순서: [도착 항공편] → [출발 숙소] → 장소들 → [복귀 숙소] → [귀국 항공편]
            const sequence = [];
            if (flightArrivalPoint) sequence.push(flightArrivalPoint);
            if (startHotel) sequence.push(startHotel);
            currentList.forEach(p => sequence.push(p));
            if (endHotel) sequence.push(endHotel);
            if (flightDeparturePoint) sequence.push(flightDeparturePoint);

            // 💡 순서상 다음 지점까지의 "구글 맵스 경로 보기" 링크를 하나씩 소비하면서 그려주는 헬퍼.
            //    항공편/숙소 고정 카드와 장소 카드 모두 같은 방식으로 사용하므로,
            //    무엇이 있고 없는지와 상관없이 항상 두 지점 "사이"에 링크가 위치하게 된다.
            let seqPos = 0;
            function consumeNextLinkHTML() {
                const html = (seqPos + 1 < sequence.length) ? buildDeepLinkHTML(sequence[seqPos], sequence[seqPos + 1]) : '';
                seqPos++;
                return html;
            }

            // 💡 하루의 맨 처음 (1일차에만): 도착한 비행기
            if (flightArrivalPoint) {
                const f = flightsData.outbound;
                const airlineTag = f.airline ? ` <span class="fi-addr" style="display:inline;">(${f.airline})</span>` : '';
                let html = `<div class="fixed-item flight-item"><div><span class="fi-label">✈️ ${f.flightNo}</span>${f.dep.iata || f.dep.name || '?'} → ${f.arr.iata || f.arr.name || '?'}${airlineTag}<span class="fi-addr">${f.dep.time || ''} 출발 → ${f.arr.time || ''} 도착 · ${f.arr.name || ''}</span></div></div>`;
                html += consumeNextLinkHTML();
                flightStartContainer.innerHTML = html;
            }

            // 💡 하루의 시작: (2일차부터) 전날 숙소에서 출발
            if (startHotel) {
                let html = `<div class="fixed-item"><div><span class="fi-label">🏨 출발</span>${startHotel.name}<span class="fi-addr">${startHotel.address || ''}</span></div></div>`;
                html += consumeNextLinkHTML();
                startContainer.innerHTML = html;
            }

            if (currentList.length === 0 && !startHotel && !endHotel && !flightArrivalPoint && !flightDeparturePoint) return;

            currentList.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'place-item' + (item.mealType ? ' meal-item' : '');

                let timeParts = item.time.split(':');
                if (timeParts.length !== 2) timeParts = ['10', '00'];

                let memoText = item.memo || '';
                let memoHTML = `
                    <textarea class="memo-input edit-only" rows="2" placeholder="이 장소에 대한 메모나 팁을 적어주세요!" onchange="updateMemo(${index}, this.value)">${memoText}</textarea>
                `;
                if (memoText.trim() !== '') {
                    memoHTML += `<div class="memo-text view-only">${memoText}</div>`;
                }

                const mealTagHTML = item.mealType ? `<span class="meal-tag">${MEAL_META[item.mealType].emoji} ${MEAL_META[item.mealType].label}</span>` : '';

                card.innerHTML = `
                    <div class="place-header">
                        <div class="header-left edit-only">
                            <div class="drag-handle" title="길게 눌러서 위아래로 이동">☰</div>
                            <div class="order-btns">
                                <button type="button" class="order-btn" onclick="moveItem(${index}, -1)" title="위로 이동" ${index === 0 ? 'disabled' : ''}>▲</button>
                                <button type="button" class="order-btn" onclick="moveItem(${index}, 1)" title="아래로 이동" ${index === currentList.length - 1 ? 'disabled' : ''}>▼</button>
                            </div>
                            <div class="time-wrapper">
                                <select class="time-select" onchange="updateTime(${index}, this.value, 'hour')">${generateHourOptions(timeParts[0])}</select> :
                                <select class="time-select" onchange="updateTime(${index}, this.value, 'minute')">${generateMinuteOptions(timeParts[1])}</select>
                            </div>
                        </div>
                        <div class="time-text view-only">${item.time}</div>

                        <div class="action-group edit-only">
                            <button class="delete-btn" onclick="deletePlace(${index})">삭제</button>
                        </div>
                    </div>

                    <div class="place-content">
                        <span class="place-name">${mealTagHTML}${index + 1}. ${item.name}</span>
                        <span class="place-address">${item.address}</span>
                        ${memoHTML}
                    </div>
                `;

                container.appendChild(card);

                // 💡 딥링크는 카드 "내부"가 아니라 #planner-list-container의 형제 요소로 카드 바로 뒤에 붙인다.
                //    카드 안에 넣으면 "이 장소에서 나갈 때 보는 경로"인지 "여기 오는 경로"인지 헷갈리므로,
                //    두 카드 "사이"에 독립된 요소로 두어 항상 두 지점을 잇는 구간임이 명확하게 보이게 한다.
                //    (경로 링크는 draggable: '.place-item' 대상 밖이라 SortableJS 인덱스 계산에는 영향이 없다)
                container.insertAdjacentHTML('beforeend', consumeNextLinkHTML());
            });

            // 💡 하루의 마지막: 그날 밤 묵을 숙소로 복귀
            if (endHotel) {
                let html = `<div class="fixed-item"><div><span class="fi-label">🏨 복귀</span>${endHotel.name}<span class="fi-addr">${endHotel.address || ''}</span></div></div>`;
                html += consumeNextLinkHTML();
                endContainer.innerHTML = html;
            }

            // 💡 하루의 맨 끝 (마지막날에만): 귀국 항공편 출발
            if (flightDeparturePoint) {
                const f = flightsData.return;
                const airlineTag = f.airline ? ` <span class="fi-addr" style="display:inline;">(${f.airline})</span>` : '';
                flightEndContainer.innerHTML = `<div class="fixed-item flight-item"><div><span class="fi-label">✈️ ${f.flightNo}</span>${f.dep.iata || f.dep.name || '?'} → ${f.arr.iata || f.arr.name || '?'}${airlineTag}<span class="fi-addr">${f.dep.time || ''} 출발 → ${f.arr.time || ''} 도착 · ${f.dep.name || ''}</span></div></div>`;
            }
        }

        // 💡 드래그가 어려운 환경(트랙패드/일부 모바일 브라우저 등)을 위한 대체 수단: ▲▼ 버튼으로 순서 변경
        function moveItem(index, direction) {
            const list = plannerData[currentDay];
            const newIndex = index + direction;
            if (!list || newIndex < 0 || newIndex >= list.length) return;
            const temp = list[index];
            list[index] = list[newIndex];
            list[newIndex] = temp;
            saveData();
            renderList();
            updateMarkers();
        }

        function addPlace() {
            try {
                if (!autocomplete) return;
                const place = autocomplete.getPlace();

                if (!place || !place.geometry) {
                    alert('검색 목록에서 장소를 정확히 클릭해 선택해 주세요.'); return;
                }

                if (!plannerData[currentDay]) plannerData[currentDay] = [];

                // 기존 불량 데이터 방지용 필터
                const validList = plannerData[currentDay].filter(i => i);
                let defaultTime = '10:00';
                if (validList.length > 0) {
                    defaultTime = validList[validList.length - 1].time || '10:00';
                }

                plannerData[currentDay].push({
                    name: place.name,
                    address: place.formatted_address,
                    lat: place.geometry.location.lat(),
                    lng: place.geometry.location.lng(),
                    time: defaultTime,
                    memo: ''
                });

                saveData();
                renderList(); updateMarkers(); // 💡 방금 추가한 장소로 확대하지 않고, 모든 핀이 한눈에 보이도록 자동 조정

                document.getElementById('search-input').value = '';
                document.getElementById('search-input').blur();
            } catch (error) {
                alert('장소 추가 중 오류: ' + error.message);
            }
        }

        function deletePlace(index) {
            const item = plannerData[currentDay][index];
            // 식사 항목을 리스트에서 직접 삭제하면 식사 섹션에서도 해제
            if (item && item.mealType) {
                if (!mealsData[currentDay]) mealsData[currentDay] = {};
                mealsData[currentDay][item.mealType] = { skip: false };
            }
            plannerData[currentDay].splice(index, 1);
            saveData();
            renderList(); updateMarkers(); refreshExtraButtonStates();
        }

        /* ============ 이동일(하루 안에서 도시가 바뀌는 날) 자동 구역(zone) 분리 ============
           💡 도시 이름을 따로 입력받지 않고, 장소들의 좌표 사이 실제 거리(하버사인 공식)만으로
              "같은 구역"인지 "다른 도시로 넘어간 구역"인지 자동으로 판단한다.
              같은 도시 안에서의 이동은 보통 20km를 넘지 않지만, 도시 간 이동(예: 오사카↔교토, 약 40km)은
              이 값을 훌쩍 넘기 때문에 그 지점에서 구역을 새로 나눈다. */
        const ZONE_DISTANCE_THRESHOLD_KM = 20;

        function haversineKm(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // 그 날의 장소 리스트(plannerData[day])를 순서대로 훑으면서, 앞 장소와의 거리가
        // 임계값을 넘는 지점마다 새 구역을 만든다. 반환값: [{ indices: [원본 배열 인덱스, ...] }, ...]
        function computeDayZones(day) {
            const list = plannerData[day] || [];
            const zones = [];
            list.forEach((item, idx) => {
                if (!item || item.lat == null || item.lng == null) return;
                if (zones.length === 0) { zones.push({ indices: [idx] }); return; }
                const lastZone = zones[zones.length - 1];
                const lastItem = list[lastZone.indices[lastZone.indices.length - 1]];
                const dist = haversineKm(lastItem.lat, lastItem.lng, item.lat, item.lng);
                if (dist > ZONE_DISTANCE_THRESHOLD_KM) zones.push({ indices: [idx] });
                else lastZone.indices.push(idx);
            });
            return zones;
        }

        function zoneCentroid(zone, list) {
            const pts = zone.indices.map(i => list[i]);
            return {
                lat: pts.reduce((s, p) => s + p.lat, 0) / pts.length,
                lng: pts.reduce((s, p) => s + p.lng, 0) / pts.length
            };
        }

        // 숙소처럼 별도로 관리되는 지점이 여러 구역 중 어디에 가장 가까운지 판단
        function nearestZoneIndexForPoint(zones, list, point) {
            let best = 0, bestDist = Infinity;
            zones.forEach((zone, idx) => {
                const c = zoneCentroid(zone, list);
                const d = haversineKm(c.lat, c.lng, point.lat, point.lng);
                if (d < bestDist) { bestDist = d; best = idx; }
            });
            return best;
        }

        function updateMarkers() {
            markers.forEach(m => m.setMap(null)); markers = [];
            if (!plannerData[currentDay]) return;

            const list = plannerData[currentDay];
            const dayZones = computeDayZones(currentDay);

            // 💡 구역이 2개 이상이면(=하루 안에서 다른 도시로 이동한 날) 도시 이름이나 탭 선택 없이
            //    자동으로 "가장 마지막(최신) 구역"만 지도에 보여준다. 즉, 오사카에서 교토로 이동했다면
            //    이동 후 도착한 교토 쪽 핀들만 지도에 표시되고, 오사카 핀 때문에 지도가 축소되지 않는다.
            //    구역이 1개뿐인 날(도시 이동이 없는 날)은 기존처럼 그 날 핀 전체를 다 보여준다.
            const multiZone = dayZones.length > 1;
            activeZoneIndex = multiZone ? dayZones.length - 1 : 0;
            const activeIndices = multiZone ? new Set(dayZones[activeZoneIndex].indices) : null;

            const bounds = new google.maps.LatLngBounds();
            let hasBoundsPoint = false;

            // 💡 그날의 출발/복귀 숙소 (순연 로직 적용) - 같은 위치면 마커 중복 방지
            const { startHotel, endHotel } = getDayHotels(currentDay);

            // 💡 항공편(공항) 좌표는 실제 임베드 지도의 마커/화면범위(fitBounds)에는 넣지 않는다.
            //    공항은 여행지에서 수백~수천 km 떨어진 경우가 대부분이라, 여기 넣으면
            //    지도가 도시 단위가 아니라 국가/대륙 단위로 줌아웃돼버려 사실상 지도가 못 쓰게 된다.
            //    항공편 정보는 사이드바 카드 + "구글맵스에서 열기" 외부 딥링크로만 보여준다.

            const placedHotelKeys = new Set();
            [startHotel, endHotel].forEach(h => {
                if (!h || h.lat == null || h.lng == null) return;
                // 이동일에는 숙소도 현재 표시 중인 구역에 속할 때만 지도에 함께 보여준다.
                if (multiZone && nearestZoneIndexForPoint(dayZones, list, h) !== activeZoneIndex) return;
                const key = h.lat + ',' + h.lng;
                if (placedHotelKeys.has(key)) return;
                placedHotelKeys.add(key);
                const pos = { lat: h.lat, lng: h.lng };
                const hotelMarker = new google.maps.Marker({
                    map: map, position: pos, title: h.name,
                    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 9, fillColor: '#00cec9', fillOpacity: 1, strokeColor: '#ffffff', strokeWeight: 2 }
                });
                markers.push(hotelMarker);
                bounds.extend(pos); hasBoundsPoint = true;
            });

            let shownItemCount = 0;
            list.forEach((item, index) => {
                if (!item || !item.lat || !item.lng) return;
                if (multiZone && !activeIndices.has(index)) return;
                shownItemCount++;
                const pos = { lat: item.lat, lng: item.lng };
                const marker = new google.maps.Marker({ map: map, position: pos, label: String(index + 1), title: item.name });
                markers.push(marker);
                bounds.extend(pos); hasBoundsPoint = true;
            });

            const totalPoints = shownItemCount + placedHotelKeys.size;
            if (hasBoundsPoint && totalPoints > 1) {
                map.fitBounds(bounds);
            } else if (hasBoundsPoint) {
                map.setCenter(bounds.getCenter());
                map.setZoom(15);
            }

            handleRouteDisplay();
        }

        /* ============ 뷰 모드: 장소들을 순서대로 대중교통 경로선으로 연결 ============ */

        function clearRoutes() {
            directionsRenderers.forEach(r => r.setMap(null));
            directionsRenderers = [];
            fallbackPolylines.forEach(p => p.setMap(null));
            fallbackPolylines = [];
        }

        function handleRouteDisplay() {
            clearRoutes();
            if (currentMode === 'view') drawRoutesForViewMode();
        }

        function drawRoutesForViewMode() {
            if (!plannerData[currentDay]) return;

            // 💡 숙소(출발) → 장소들 → 숙소(복귀) 구간만 대중교통 경로로 계산한다.
            //    항공편(공항) 좌표는 넣지 않는다 - 도시와 공항 사이는 대중교통 경로 자체가
            //    안 나오는 경우가 많고(국제선 등), 계산에 넣으면 지도 화면범위(fitBounds)까지
            //    같이 왜곡되어 지도가 사실상 못 쓰게 된다. 공항 구간은 사이드바의 딥링크로 안내한다.
            const dayItems = plannerData[currentDay];
            const dayZones = computeDayZones(currentDay);
            const multiZone = dayZones.length > 1;
            const activeIndices = multiZone ? new Set(dayZones[Math.min(activeZoneIndex, dayZones.length - 1)].indices) : null;

            const { startHotel, endHotel } = getDayHotels(currentDay);
            const list = [];
            // 💡 이동일에는 현재 선택된 구역과 다른 도시로 넘어가는 구간까지 선을 그리면
            //    지도 밖 먼 지점까지 경로가 이어져 화면범위(fitBounds)가 다시 깨진다.
            //    따라서 경로도 선택된 구역 안의 지점끼리만 연결한다.
            if (startHotel && startHotel.lat != null && startHotel.lng != null &&
                (!multiZone || nearestZoneIndexForPoint(dayZones, dayItems, startHotel) === activeZoneIndex)) {
                list.push(startHotel);
            }
            dayItems.forEach((p, idx) => {
                if (!p || !p.lat || !p.lng) return;
                if (multiZone && !activeIndices.has(idx)) return;
                list.push(p);
            });
            if (endHotel && endHotel.lat != null && endHotel.lng != null &&
                (!multiZone || nearestZoneIndexForPoint(dayZones, dayItems, endHotel) === activeZoneIndex)) {
                list.push(endHotel);
            }

            if (list.length < 2) return;

            if (!directionsService) directionsService = new google.maps.DirectionsService();

            for (let i = 0; i < list.length - 1; i++) {
                const origin = { lat: list[i].lat, lng: list[i].lng };
                const destination = { lat: list[i + 1].lat, lng: list[i + 1].lng };

                const renderer = new google.maps.DirectionsRenderer({
                    map: map,
                    suppressMarkers: true,
                    preserveViewport: true,
                    polylineOptions: { strokeColor: '#0984e3', strokeWeight: 4, strokeOpacity: 0.85 }
                });
                directionsRenderers.push(renderer);

                directionsService.route(
                    { origin, destination, travelMode: google.maps.TravelMode.TRANSIT },
                    (result, status) => {
                        if (status === 'OK') {
                            renderer.setDirections(result);
                        } else {
                            // 💡 대중교통 경로를 찾지 못한 경우, 점선으로 직선 연결 (거리가 너무 가깝거나 경로 정보가 없는 경우 등)
                            renderer.setMap(null);
                            const line = new google.maps.Polyline({
                                path: [origin, destination],
                                strokeOpacity: 0,
                                icons: [{
                                    icon: { path: 'M 0,-1 0,1', strokeOpacity: 1, scale: 3 },
                                    offset: '0',
                                    repeat: '10px'
                                }],
                                strokeColor: '#0984e3',
                                map: map
                            });
                            fallbackPolylines.push(line);
                        }
                    }
                );
            }
        }

        /* ============ PDF 내보내기 ============
           💡 예전 방식(html2canvas로 화면을 통째로 스크린샷 찍어 이미지로 삽입)은 일정이 조금만 길어도
              이미지가 페이지 높이를 넘어서 잘리거나 이상하게 늘어나 보이는 문제가 있었다.
              그래서 지금은 jsPDF로 텍스트를 직접 그려서, 내용이 페이지를 넘기면 자동으로 다음 장으로
              넘어가는(page break) 진짜 텍스트 기반 PDF를 만든다. 글자 수가 이미지보다 훨씬 작기 때문에
              보통 하루 일정은 1~2장 안에 깔끔하게 들어간다.
              단, jsPDF의 기본 폰트는 한글을 지원하지 않으므로, 한글이 깨지지 않도록 나눔고딕 폰트를
              (최초 1회) CDN에서 내려받아 PDF에 내장한다. */

        let cachedKoreanFontBase64 = null;

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const chunkSize = 0x8000;
            for (let i = 0; i < bytes.length; i += chunkSize) {
                binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
            }
            return btoa(binary);
        }

        async function ensureKoreanFont(pdf) {
            if (!cachedKoreanFontBase64) {
                const fontUrl = 'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/nanumgothic/NanumGothic-Regular.ttf';
                const res = await fetch(fontUrl);
                if (!res.ok) throw new Error('한글 폰트를 불러오지 못했습니다.');
                const buffer = await res.arrayBuffer();
                cachedKoreanFontBase64 = arrayBufferToBase64(buffer);
            }
            pdf.addFileToVFS('NanumGothic-Regular.ttf', cachedKoreanFontBase64);
            pdf.addFont('NanumGothic-Regular.ttf', 'NanumGothic', 'normal');
            pdf.setFont('NanumGothic', 'normal');
        }

        async function exportToPDF() {
            syncMealItemsIntoList();
            const { startHotel, endHotel } = getDayHotels(currentDay);
            const isFirstDay = currentDay === 1;
            const isLastDay = currentDay === totalTripDays;
            const flightArrival = (isFirstDay && flightsData.outbound) ? flightsData.outbound : null;
            const flightDeparture = (isLastDay && flightsData.return) ? flightsData.return : null;
            const dayItems = plannerData[currentDay] || [];
            const dayExpenses = expensesData[currentDay] || [];

            if (dayItems.length === 0 && !startHotel && !endHotel && !flightArrival && !flightDeparture) {
                alert('저장할 일정이 없습니다!'); return;
            }

            const btn = document.querySelector('.pdf-btn');
            const originalLabel = btn ? btn.innerText : '';
            if (btn) { btn.innerText = '⏳ PDF 만드는 중...'; btn.disabled = true; }

            try {
                window.jsPDF = window.jspdf.jsPDF;
                const pdf = new jsPDF('p', 'mm', 'a4');
                await ensureKoreanFont(pdf);

                // ---- 레이아웃 상수 ----
                const pageW = 210, pageH = 297;
                const marginL = 16, marginR = 16, marginT = 18, marginB = 16;
                const usableW = pageW - marginL - marginR;
                const COLOR_PRIMARY = [108, 92, 231];   // #6c5ce7
                const COLOR_ACCENT  = [9, 132, 227];    // #0984e3
                const COLOR_TEXT    = [45, 52, 54];     // #2d3436
                const COLOR_SUB     = [127, 143, 166];  // #7f8fa6
                const COLOR_LINE    = [223, 224, 228];

                let y = marginT;

                function newPage() {
                    pdf.addPage();
                    y = marginT;
                }
                function ensure(need) {
                    if (y + need > pageH - marginB) newPage();
                }
                // 💡 별도 bold 폰트 파일 없이도 살짝 두껍게 보이도록, 같은 글자를 아주 살짝 겹쳐 두 번 그린다.
                function boldText(text, x, size, color) {
                    pdf.setFontSize(size);
                    pdf.setTextColor(color[0], color[1], color[2]);
                    pdf.text(text, x, y);
                    pdf.text(text, x + 0.15, y);
                }
                function normalText(text, x, size, color) {
                    pdf.setFontSize(size);
                    pdf.setTextColor(color[0], color[1], color[2]);
                    pdf.text(text, x, y);
                }
                function wrappedText(text, x, size, color, maxWidth) {
                    pdf.setFontSize(size);
                    pdf.setTextColor(color[0], color[1], color[2]);
                    const lines = pdf.splitTextToSize(text, maxWidth);
                    ensure(lines.length * (size * 0.42) + 1);
                    pdf.text(lines, x, y);
                    y += lines.length * (size * 0.42);
                    return lines.length;
                }
                function hr() {
                    ensure(4);
                    pdf.setDrawColor(COLOR_LINE[0], COLOR_LINE[1], COLOR_LINE[2]);
                    pdf.setLineWidth(0.2);
                    pdf.line(marginL, y, pageW - marginR, y);
                    y += 4;
                }

                // ---- 제목 ----
                const dateObj = tripDates[currentDay];
                const dateStr = dateObj ? dateObj.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' }) : '';
                boldText(`${tripCity || ''} 여행 일정표`, pageW / 2 - pdf.getTextWidth(`${tripCity || ''} 여행 일정표`) / 2, 17, COLOR_PRIMARY);
                y += 7;
                normalText(`${currentDay}일차 / 총 ${totalTripDays}일   ·   ${dateStr}`, pageW / 2 - pdf.getTextWidth(`${currentDay}일차 / 총 ${totalTripDays}일   ·   ${dateStr}`) / 2, 10.5, COLOR_SUB);
                y += 6;
                pdf.setDrawColor(COLOR_PRIMARY[0], COLOR_PRIMARY[1], COLOR_PRIMARY[2]);
                pdf.setLineWidth(0.7);
                pdf.line(marginL, y, pageW - marginR, y);
                y += 8;

                // ---- 항공편(도착) ----
                if (flightArrival) {
                    const f = flightArrival;
                    ensure(16);
                    boldText(`✈️ 도착 항공편 · ${f.flightNo}${f.airline ? ' (' + f.airline + ')' : ''}`, marginL, 11.5, COLOR_PRIMARY);
                    y += 5.5;
                    normalText(`${f.dep.iata || f.dep.name || '?'} → ${f.arr.iata || f.arr.name || '?'}   |   ${f.dep.time || '--:--'} 출발 → ${f.arr.time || '--:--'} 도착`, marginL, 10, COLOR_TEXT);
                    y += 5;
                    if (f.arr.name) { wrappedText(`도착지: ${f.arr.name}`, marginL, 8.5, COLOR_SUB, usableW); y += 1; }
                    y += 2;
                    hr();
                }

                // ---- 출발 숙소 ----
                if (startHotel) {
                    ensure(14);
                    boldText(`🏨 출발 숙소`, marginL, 11, COLOR_ACCENT);
                    y += 5.5;
                    wrappedText(startHotel.name || '', marginL, 10, COLOR_TEXT, usableW);
                    if (startHotel.address) wrappedText(startHotel.address, marginL, 8.5, COLOR_SUB, usableW);
                    y += 3;
                    hr();
                }

                // ---- 하루 일정(장소/식사) ----
                dayItems.forEach((item, idx) => {
                    const mealMeta = item.mealType ? MEAL_META[item.mealType] : null;
                    const labelPrefix = mealMeta ? `${mealMeta.emoji} [${mealMeta.label}] ` : '';
                    const memoText = (item.memo || '').trim();

                    ensure(12);
                    boldText(`${idx + 1}. ${item.time || ''}  ${labelPrefix}${item.name || ''}`, marginL, 10.5, COLOR_TEXT);
                    y += 5;
                    if (item.address) wrappedText(item.address, marginL + 4, 8.5, COLOR_SUB, usableW - 4);
                    if (memoText) { y += 0.5; wrappedText(`📝 ${memoText}`, marginL + 4, 8.5, COLOR_ACCENT, usableW - 4); }
                    y += 4;
                });
                if (dayItems.length > 0) hr();

                // ---- 복귀 숙소 ----
                if (endHotel) {
                    ensure(14);
                    boldText(`🏨 복귀 숙소`, marginL, 11, COLOR_ACCENT);
                    y += 5.5;
                    wrappedText(endHotel.name || '', marginL, 10, COLOR_TEXT, usableW);
                    if (endHotel.address) wrappedText(endHotel.address, marginL, 8.5, COLOR_SUB, usableW);
                    y += 3;
                    hr();
                }

                // ---- 항공편(출발) ----
                if (flightDeparture) {
                    const f = flightDeparture;
                    ensure(16);
                    boldText(`✈️ 귀국 항공편 · ${f.flightNo}${f.airline ? ' (' + f.airline + ')' : ''}`, marginL, 11.5, COLOR_PRIMARY);
                    y += 5.5;
                    normalText(`${f.dep.iata || f.dep.name || '?'} → ${f.arr.iata || f.arr.name || '?'}   |   ${f.dep.time || '--:--'} 출발 → ${f.arr.time || '--:--'} 도착`, marginL, 10, COLOR_TEXT);
                    y += 5;
                    if (f.dep.name) { wrappedText(`출발지: ${f.dep.name}`, marginL, 8.5, COLOR_SUB, usableW); y += 1; }
                    y += 2;
                    hr();
                }

                // ---- 이 날의 경비 ----
                if (dayExpenses.length > 0) {
                    const dayTotal = dayExpenses.reduce((sum, e) => sum + (Number(e.amount) || 0), 0);
                    ensure(10 + dayExpenses.length * 5);
                    boldText(`💰 이 날의 경비`, marginL, 11, COLOR_ACCENT);
                    y += 5.5;
                    dayExpenses.forEach(e => {
                        ensure(5);
                        normalText(e.desc || '', marginL, 9, COLOR_TEXT);
                        const amountText = `${Number(e.amount).toLocaleString()}원`;
                        normalText(amountText, pageW - marginR - pdf.getTextWidth(amountText), 9, COLOR_TEXT);
                        y += 4.5;
                    });
                    ensure(6);
                    boldText(`합계`, marginL, 9.5, COLOR_TEXT);
                    const totalText = `${dayTotal.toLocaleString()}원`;
                    boldText(totalText, pageW - marginR - pdf.getTextWidth(totalText), 9.5, COLOR_PRIMARY);
                    y += 5;
                }

                // ---- 페이지 번호 ----
                const pageCount = pdf.getNumberOfPages();
                for (let p = 1; p <= pageCount; p++) {
                    pdf.setPage(p);
                    pdf.setFontSize(8.5);
                    pdf.setTextColor(COLOR_SUB[0], COLOR_SUB[1], COLOR_SUB[2]);
                    pdf.text(`${p} / ${pageCount}`, pageW / 2, pageH - 9, { align: 'center' });
                }

                pdf.save(`여행일정표_${currentDay}일차.pdf`);
            } catch (error) {
                alert('PDF 생성 중 오류가 발생했습니다. (네트워크 상태를 확인하고 다시 시도해주세요)');
            } finally {
                if (btn) { btn.innerText = originalLabel; btn.disabled = false; }
            }
        }
    </script>

</body>
</html>
